<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拍立食 | 社区</title>
  <link rel="stylesheet" href="wechat-unified.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand-primary: #235347;
      --brand-accent: #8EB69B;
      --bg: radial-gradient(circle at 16% 9%, rgba(35, 83, 71, .54) 0, rgba(35, 83, 71, 0) 32%),
            radial-gradient(circle at 84% 14%, rgba(142, 182, 155, .3) 0, rgba(142, 182, 155, 0) 30%),
            radial-gradient(circle at 48% 96%, rgba(35, 83, 71, .22) 0, rgba(35, 83, 71, 0) 38%),
            linear-gradient(180deg, #050505 0%, #000 100%);
      --text: rgba(255, 255, 255, .96);
      --sub: rgba(255, 255, 255, .74);
      --mute: rgba(255, 255, 255, .5);
      --line: rgba(142, 182, 155, .22);
      --space-8: 8px;
      --space-12: 12px;
      --space-16: 16px;
      --space-20: 20px;
      --space-24: 24px;
      --space-32: 32px;
      --radius-device: 40px;
      --radius-card: 28px;
      --radius-secondary: 24px;
      --radius-pill: 999px;
      --ease: cubic-bezier(.22, 1, .36, 1);
      --display: "SF Pro Display", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      --body: "SF Pro Text", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #000; }
    body {
      display: flex;
      justify-content: center;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    button { border: 0; background: none; color: inherit; font: inherit; padding: 0; cursor: pointer; }
    img { display: block; width: 100%; height: 100%; object-fit: cover; }
    .material-symbols-outlined {
      font-family: "Material Symbols Outlined";
      font-style: normal;
      line-height: 1;
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    .device {
      position: relative;
      width: min(100%, 414px);
      height: min(calc(100vh - 40px), 896px);
      min-height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: var(--radius-device);
      border: 1px solid rgba(255, 255, 255, .06);
      background: linear-gradient(180deg, rgba(23, 23, 25, .95), rgba(0, 0, 0, .99));
      box-shadow: 0 28px 58px rgba(0,0,0,.46), inset 0 1px 0 rgba(255,255,255,.05);
      isolation: isolate;
    }
    .device::before,
    .device::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(72px);
      pointer-events: none;
      z-index: 0;
    }
    .device::before { width: 240px; height: 240px; top: 78px; right: -62px; background: rgba(35, 83, 71, .36); }
    .device::after { width: 250px; height: 250px; left: -96px; bottom: 110px; background: rgba(142, 182, 155, .16); }

    .status {
      position: sticky;
      top: 0;
      z-index: 8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 24px 6px;
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
      background: linear-gradient(180deg, rgba(0,0,0,.34) 0%, rgba(0,0,0,0) 100%);
    }
    .device.is-detail .status { background: linear-gradient(180deg, rgba(0,0,0,.16) 0%, rgba(0,0,0,0) 92%); }
    .status i { display: flex; gap: 8px; }
    .status i span { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.94); display: inline-flex; }
    .status i span:last-child { width: 18px; border-radius: 999px; }

    .feed,.detail {
      position: relative;
      z-index: 1;
      transition: opacity .24s var(--ease), transform .24s var(--ease), filter .24s var(--ease);
    }
    .feed {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
      scrollbar-width: none;
      padding: var(--space-8) var(--space-20) 136px;
    }
    .feed::-webkit-scrollbar { display: none; }
    .device.is-detail .feed { opacity: 0; transform: scale(.985) translateY(var(--space-12)); filter: blur(10px); pointer-events: none; }
    .device.is-detail .detail { opacity: 1; transform: none; pointer-events: auto; }
    .device.is-detail .dock { opacity: 0; transform: translate(-50%,18px); pointer-events: none; }

    .topbar {
      display: grid;
      grid-template-columns: 40px 1fr 40px;
      align-items: center;
      gap: var(--space-12);
      margin-bottom: var(--space-12);
    }
    .icon {
      width: 40px;
      height: 40px;
      border-radius: var(--space-16);
      border: 1px solid rgba(255,255,255,.12);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)), linear-gradient(180deg, rgba(21,21,21,.96), rgba(10,10,10,.98));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 12px 26px rgba(0,0,0,.18);
      display: grid;
      place-items: center;
    }
    .title { text-align: center; }
    .title h1 {
      margin: 0;
      font-family: var(--display);
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: -.02em;
      font-weight: 620;
    }

    .categories {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: var(--space-12);
      margin: var(--space-12) 0 var(--space-24);
    }
    .cat {
      min-height: 82px;
      border-radius: var(--radius-secondary);
      border: 1px solid rgba(142,182,155,.18);
      background: linear-gradient(180deg, rgba(142,182,155,.08), rgba(255,255,255,.03));
      color: var(--sub);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-8);
      padding: var(--space-12) var(--space-8);
      transition: transform .22s var(--ease), border-color .22s var(--ease), background .22s var(--ease);
    }
    .cat strong { font-size: 11px; line-height: 1.24; text-align: center; font-weight: 600; }
    .cat.active {
      color: #fff;
      border-color: rgba(142,182,155,.34);
      background: linear-gradient(180deg, rgba(142,182,155,.28), rgba(35,83,71,.3));
      transform: translateY(-2px);
    }

    .section { margin-bottom: var(--space-24); }
    .section-head { display: flex; justify-content: space-between; align-items: center; gap: var(--space-12); margin-bottom: var(--space-12); }
    .section-head h3 {
      margin: 0;
      font-family: var(--display);
      font-size: 20px;
      line-height: 1.06;
      letter-spacing: -.05em;
      font-weight: 680;
    }
    .section-link {
      min-height: 32px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(142,182,155,.2);
      background: linear-gradient(180deg, rgba(142,182,155,.12), rgba(255,255,255,.04));
      color: var(--sub);
      font-size: 12px;
      line-height: 32px;
      padding: 0 var(--space-12);
    }

    .rail {
      display: flex;
      gap: var(--space-12);
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      touch-action: pan-x;
      overscroll-behavior-x: contain;
      will-change: transform;
      transition: transform .22s var(--ease);
    }
    .rail::-webkit-scrollbar { display: none; }
    .card {
      flex: 0 0 248px;
      min-height: 0;
      aspect-ratio: .87;
      border-radius: var(--radius-card);
      overflow: hidden;
      text-align: left;
      scroll-snap-align: start;
      border: 1px solid var(--line);
      background: linear-gradient(160deg, rgba(142,182,155,.16), rgba(255,255,255,.03) 28%, rgba(255,255,255,.01)), linear-gradient(180deg, rgba(18,18,19,.95), rgba(8,8,8,.99));
      box-shadow: 0 22px 44px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.04), inset 0 0 0 1px rgba(142,182,155,.08);
      position: relative;
    }
    .card.compact { flex-basis: 214px; aspect-ratio: .86; }
    .media { position: relative; width: 100%; height: 100%; aspect-ratio: auto; }
    .media::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.06), rgba(0,0,0,.16) 34%, rgba(0,0,0,.78)), radial-gradient(circle at 16% 14%, rgba(142,182,155,.34), rgba(142,182,155,0) 32%);
    }
    .badges { position: absolute; top: var(--space-12); left: var(--space-12); right: var(--space-12); z-index: 1; display: flex; justify-content: space-between; gap: var(--space-8); }
    .chip,.score {
      min-height: 32px;
      border-radius: var(--radius-pill);
      border: 1px solid rgba(142,182,155,.22);
      background: linear-gradient(180deg, rgba(142,182,155,.16), rgba(9,9,10,.44));
      backdrop-filter: blur(14px);
      font-size: 11px;
      line-height: 1;
      padding: 0 var(--space-12);
      display: inline-flex;
      align-items: center;
      gap: var(--space-8);
    }
    .score .material-symbols-outlined { font-size: 15px; color: #d4b178; font-variation-settings: "FILL" 1, "wght" 500, "GRAD" 0, "opsz" 15; }
    .copy { position: absolute; left: var(--space-16); right: var(--space-16); bottom: var(--space-16); z-index: 1; }
    .copy h4 {
      margin: 0;
      font-family: var(--display);
      font-size: 23px;
      line-height: 1.04;
      letter-spacing: -.05em;
      font-weight: 660;
      text-shadow: 0 10px 28px rgba(0,0,0,.4);
    }
    .copy p { margin: var(--space-8) 0 0; font-size: 13px; line-height: 1.58; color: rgba(255,255,255,.74); }
    .compact .copy h4 { font-size: 20px; line-height: 1.06; }

    .detail {
      position: absolute;
      inset: 0;
      opacity: 0;
      transform: translateY(var(--space-24)) scale(.99);
      pointer-events: none;
      background: radial-gradient(circle at 76% 18%, rgba(35,83,71,.16), rgba(35,83,71,0) 32%), linear-gradient(180deg, rgba(7,7,7,.98), #000);
      display: flex;
      flex-direction: column;
    }
    .detail-scroll { flex: 1; overflow-y: auto; padding-bottom: var(--space-16); scrollbar-width: none; }
    .detail-scroll::-webkit-scrollbar { display: none; }
    .hero { position: relative; height: 348px; overflow: hidden; }
    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.18), rgba(0,0,0,.08) 22%, rgba(0,0,0,.76)), radial-gradient(circle at 18% 18%, rgba(142,182,155,.36), rgba(142,182,155,0) 30%);
    }
    .detail-top { position: absolute; top: 52px; left: 0; right: 0; z-index: 2; display: flex; justify-content: space-between; padding: 0 var(--space-20); }
    .hero-copy { position: absolute; left: var(--space-20); right: var(--space-20); bottom: var(--space-24); z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; gap: var(--space-12); }
    .hero-copy h2 {
      margin: 0;
      font-family: var(--display);
      font-size: 28px;
      line-height: 1.02;
      letter-spacing: -.06em;
      font-weight: 670;
      text-shadow: 0 16px 34px rgba(0,0,0,.42);
    }
    .price {
      min-width: 88px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(8,8,9,.42);
      backdrop-filter: blur(18px);
      text-align: right;
      padding: 12px 14px;
    }
    .price { display: none; }
    .price strong { font-family: var(--display); font-size: 24px; line-height: 1; letter-spacing: -.04em; display: block; }
    .sheet {
      margin: 0 var(--space-16);
      border-radius: var(--radius-card);
      border: 1px solid var(--line);
      background: linear-gradient(160deg, rgba(142,182,155,.14), rgba(255,255,255,.03) 30%, rgba(255,255,255,.01)), linear-gradient(180deg, rgba(18,18,19,.95), rgba(8,8,8,.99));
      box-shadow: 0 22px 44px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.04), inset 0 0 0 1px rgba(142,182,155,.06);
      padding: var(--space-20) var(--space-16) var(--space-16);
    }
    .sheet h3 { display: none; }
    .sheet > p { margin: 0 0 var(--space-16); font-size: 13px; line-height: 1.72; color: var(--sub); }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: var(--space-12); margin-bottom: var(--space-20); }
    .stat { border-radius: 22px; border: 1px solid rgba(142,182,155,.2); background: linear-gradient(180deg, rgba(142,182,155,.12), rgba(255,255,255,.03)); padding: var(--space-12); display: flex; align-items: center; justify-content: center; text-align: center; min-height: 56px; }
    .stat strong { font-family: var(--body); font-size: 15px; line-height: 1.24; letter-spacing: -.01em; font-weight: 600; display: block; white-space: nowrap; text-align: center; }
    .grid { display: grid; gap: var(--space-12); }
    .detail-box { border-radius: var(--radius-secondary); border: 1px solid rgba(142,182,155,.2); background: linear-gradient(180deg, rgba(142,182,155,.1), rgba(255,255,255,.03)); padding: var(--space-16); }
    .detail-box small { display: block; margin-bottom: var(--space-8); color: var(--mute); font-size: 10px; line-height: 14px; letter-spacing: .16em; text-transform: uppercase; }
    .detail-box p { margin: 0; font-size: 13px; line-height: 1.68; color: rgba(255,255,255,.84); }
    .tags { display: flex; flex-wrap: wrap; gap: var(--space-8); }
    .tag { min-height: 32px; border-radius: var(--radius-pill); border: 1px solid rgba(142,182,155,.2); background: linear-gradient(180deg, rgba(142,182,155,.12), rgba(255,255,255,.03)); padding: 0 var(--space-12); display: inline-flex; align-items: center; font-size: 11px; line-height: 1; }
    .detail-actions { margin: var(--space-12) var(--space-16) var(--space-16); padding: var(--space-12); border-radius: var(--radius-secondary); border: 1px solid rgba(142,182,155,.18); background: linear-gradient(180deg, rgba(35,83,71,.14), rgba(6,6,6,.72)); backdrop-filter: blur(18px); box-shadow: 0 12px 24px rgba(0,0,0,.28); }
    .cta {
      width: 100%; min-height: 56px; border-radius: var(--radius-pill); border: 1px solid rgba(142,182,155,.24);
      background: linear-gradient(135deg, rgba(142,182,155,.94), rgba(35,83,71,.98)); color: #fff;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 16px; line-height: 1; letter-spacing: -.01em; font-weight: 620;
      box-shadow: 0 16px 30px rgba(35,83,71,.28);
    }

    .decision-backdrop { position: absolute; inset: 0; z-index: 5; display: flex; align-items: flex-end; justify-content: center; padding: var(--space-20) var(--space-16) 104px; background: rgba(4,4,5,.34); backdrop-filter: blur(8px); opacity: 0; pointer-events: none; transition: opacity .22s var(--ease); }
    .decision-sheet { width: 100%; border-radius: var(--radius-card); border: 1px solid var(--line); background: linear-gradient(160deg, rgba(142,182,155,.16), rgba(255,255,255,.03) 28%, rgba(255,255,255,.01)), linear-gradient(180deg, rgba(18,18,19,.95), rgba(8,8,8,.99)); box-shadow: 0 22px 44px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.04), inset 0 0 0 1px rgba(142,182,155,.06); padding: var(--space-20) var(--space-16) var(--space-16); transform: translateY(var(--space-24)) scale(.98); transition: transform .24s var(--ease); }
    .handle { width: 42px; height: 5px; border-radius: var(--radius-pill); background: rgba(255,255,255,.16); margin: 0 auto var(--space-12); }
    .decision-sheet h4 { margin: 0; font-family: var(--display); font-size: 20px; line-height: 1.15; letter-spacing: -.03em; font-weight: 650; }
    .decision-sheet p { margin: var(--space-8) 0 0; font-size: 13px; line-height: 1.7; color: var(--sub); }
    .decision-actions { display: grid; gap: var(--space-12); margin-top: var(--space-16); }
    .direct,.secondary { min-height: 56px; border-radius: var(--radius-pill); font-size: 16px; line-height: 1; letter-spacing: -.01em; font-weight: 620; display: inline-flex; align-items: center; justify-content: center; padding: 0 var(--space-16); }
    .direct { border: 1px solid rgba(142,182,155,.24); background: linear-gradient(135deg, rgba(142,182,155,.94), rgba(35,83,71,.98)); box-shadow: 0 16px 30px rgba(35,83,71,.28); }
    .secondary { border: 1px solid rgba(142,182,155,.2); background: linear-gradient(180deg, rgba(142,182,155,.12), rgba(255,255,255,.04)); color: rgba(255,255,255,.92); }
    .markets { display: none; grid-template-columns: repeat(2, minmax(0,1fr)); gap: var(--space-12); margin-top: var(--space-12); }
    .decision-sheet.markets-open .prompt { display: none; }
    .decision-sheet.markets-open .markets { display: grid; }
    .market { min-height: 80px; border-radius: 22px; border: 1px solid rgba(142,182,155,.2); background: linear-gradient(180deg, rgba(142,182,155,.12), rgba(255,255,255,.04)); padding: var(--space-12); display: flex; align-items: center; gap: var(--space-12); }
    .market-icon { width: 42px; height: 42px; border-radius: 12px; border: 1px solid rgba(142,182,155,.24); background: linear-gradient(180deg, rgba(142,182,155,.22), rgba(255,255,255,.06)); display: grid; place-items: center; overflow: hidden; }
    .market-icon img { width: 100%; height: 100%; object-fit: contain; }
    .market-copy strong { display: block; font-size: 14px; line-height: 1.2; letter-spacing: -.01em; font-weight: 620; }
    .market-copy span { display: block; margin-top: var(--space-8); font-size: 11px; line-height: 1.35; color: var(--mute); }

    .dock { position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%); width: min(calc(100% - 40px), 374px); display: grid; grid-template-columns: repeat(5,minmax(0,1fr)); align-items: end; gap: var(--space-8); padding: 10px 8px 8px; border-radius: var(--radius-card); border: 1px solid rgba(142,182,155,.2); background: linear-gradient(180deg, rgba(35,83,71,.18), rgba(6,6,6,.9)); box-shadow: 0 18px 36px rgba(0,0,0,.46), inset 0 1px 0 rgba(255,255,255,.03); backdrop-filter: blur(28px); z-index: 4; transition: opacity .24s var(--ease), transform .24s var(--ease); }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 6px; font-size: 10.5px; line-height: 12px; font-weight: 500; color: rgba(255,255,255,.5); }
    .nav-item strong { width: 36px; height: 36px; border-radius: 12px; border: 1px solid rgba(255,255,255,.08); background: rgba(255,255,255,.05); color: rgba(255,255,255,.82); display: grid; place-items: center; }
    .nav-item strong .material-symbols-outlined { font-size: 18px; }
    .nav-item.active { color: #fff; }
    .nav-item.active strong { background: linear-gradient(180deg, rgba(55,118,101,.96), rgba(35,83,71,.98)); border-color: rgba(142,182,155,.26); }
    .plus-wrap { display: flex; justify-content: center; position: relative; top: -18px; }
    .plus { width: 52px; height: 52px; border-radius: 50%; border: 1px solid rgba(255,255,255,.12); background: linear-gradient(135deg, rgba(52,106,91,.98), rgba(35,83,71,.98)); color: #fff; box-shadow: 0 10px 22px rgba(35,83,71,.34), 0 0 24px rgba(35,83,71,.14); display: grid; place-items: center; }

    .device.is-decision-open .decision-backdrop { opacity: 1; pointer-events: auto; }
    .device.is-decision-open .decision-sheet { transform: none; }

    @media (max-width: 430px) {
      body { padding: 0; }
      .device { width: 100%; height: 100dvh; min-height: 100dvh; border-radius: 0; border-left: 0; border-right: 0; }
      .feed { padding-left: 16px; padding-right: 16px; }
      .card { flex-basis: 236px; }
      .card.compact { flex-basis: 202px; }
      .detail-top,.hero-copy { left: 16px; right: 16px; }
      .sheet { margin-left: 12px; margin-right: 12px; }
      .detail-actions { margin-left: 12px; margin-right: 12px; margin-bottom: 12px; }
    }
  </style>
  <style data-phase5-baseline>
    :root {
      color-scheme: dark;
      --brand-primary: #235347;
      --brand-accent: #8EB69B;
      --space-8: 8px;
      --space-12: 12px;
      --space-16: 16px;
      --space-20: 20px;
      --space-24: 24px;
      --space-32: 32px;
      --radius-device: 40px;
      --radius-card: 28px;
      --radius-pill: 999px;
      --font-display: "SF Pro Display", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --font-body: "SF Pro Text", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --motion-fast: 180ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    html, body { font-family: var(--font-body); }
    h1, h2, h3, h4, .font-display, [data-display] { font-family: var(--font-display); }
    button, .chip, .selection-chip, .nav-item, .icon, .cat {
      transition: transform var(--motion-fast), opacity var(--motion-fast), background-color var(--motion-fast), border-color var(--motion-fast), box-shadow var(--motion-fast);
    }
    button:active, .selection-chip:active, .cat:active { transform: scale(0.98); }
    .text-primary { color: var(--brand-primary) !important; }
    .bg-primary { background-color: var(--brand-primary) !important; }
    .border-primary { border-color: var(--brand-primary) !important; }
  </style>
</head>

  <script>
    const dishes = [
      { id: "scallop", section: "interest", category: ["all", "hearty"], title: "扇贝失控现场", subtitle: "黄油、焦边和留白一起把舞台撑住", image: "../../assets/backgrounds/95dc01ddadd7c54292be548b216e61d8.jpg", badge: "今晚压轴", score: "4.9", duration: "15分钟", price: "¥45", mood: "正式晚餐", description: "把剩下的扇贝、黄油和一点绿叶做成像作品发布现场一样的热盘，主角明确，边缘克制。", reason: "它不是堆料型热闹，而是把焦香控制在刚刚好那一层，入口第一秒就有主角感。", marketCopy: "优先补齐黄油、扇贝和一抹能提亮盘面的绿色配菜，顺手带一只白盘，效果会更完整。", tags: ["焦香主角", "晚餐压轴", "留白摆盘"] },
      { id: "burger", section: "interest", category: ["all", "night", "snack"], title: "午夜双层堡", subtitle: "浓郁到有点危险，但完全值得", image: "../../assets/backgrounds/1.png", badge: "深夜高赞", score: "4.7", duration: "12分钟", price: "¥36", mood: "深夜救场", description: "剩牛肉、芝士和一点烤洋葱被重新压缩成重口但不粗糙的深夜解法。", reason: "芝士和焦边一起把情绪顶上来，是典型的深夜主角盘。", marketCopy: "补牛肉饼、芝士片和生菜就够，其它都能在冰箱里自己完成重组。", tags: ["罪恶感", "夜宵主角", "一口满足"] },
      { id: "rice", section: "interest", category: ["all", "hearty"], title: "焦糖鸡腿饭", subtitle: "收汁很亮，米饭也被照顾到了", image: "../../assets/backgrounds/5.png", badge: "一盘见效", score: "4.8", duration: "18分钟", price: "¥32", mood: "下班之后", description: "把鸡腿的油脂控制在亮泽但不负担的那一层，米饭只负责承接，不抢戏。", reason: "它最适合把松散食材重新收口，味道稳，视觉也稳。", marketCopy: "鸡腿、米饭和一点提亮的小葱最关键，调味只要保持焦糖感。", tags: ["热盘主菜", "下班快手", "收汁亮泽"] },
      { id: "sushi", section: "tonight", category: ["all", "fresh"], title: "夜幕寿司", subtitle: "更安静的一盘，边缘很干净", image: "../../assets/backgrounds/3.jpg", badge: "冷盘灵感", score: "4.6", duration: "10分钟", price: "¥28", mood: "轻盈收尾", description: "适合把剩下的刺身和米饭重新整理成一盘干净、克制、看起来不费力的作品。", reason: "它不是为了炫耀，而是为了让颜色、留白和切面一起说话。", marketCopy: "优先补刺身和米饭，顺手带一点海苔与香草，盘面会更完整。", tags: ["冷盘", "轻盈", "线条感"] },
      { id: "steak", section: "tonight", category: ["all", "hearty"], title: "热板牛排", subtitle: "焦边够响，中心依旧柔软", image: "../../assets/backgrounds/4.jpg", badge: "高热盘面", score: "4.8", duration: "14分钟", price: "¥39", mood: "周末主菜", description: "剩牛排不需要重新发明，只要重新安排热度、切面和摆位，就会像新做的一样。", reason: "这类菜的关键是控制火候与留白，不是把所有配菜堆满盘面。", marketCopy: "带一点黄油、海盐和一抹绿色即可，真正决定质感的还是牛排本身。", tags: ["主角感", "高温焦边", "干净收口"] },
      { id: "snack", section: "tonight", category: ["all", "snack", "night"], title: "一口拼盘", subtitle: "把零碎食材重新编排成节奏", image: "../../assets/backgrounds/2.jpg", badge: "零食重组", score: "4.5", duration: "8分钟", price: "¥22", mood: "边聊边吃", description: "适合把散碎的小食、蘸酱和一点炙烤元素拼成一个有秩序的分享盘。", reason: "它更像一块会说话的桌面编排，不需要复杂做法，但很适合拍照。", marketCopy: "去补蘸酱、香草和一个统一色系的主食材，整盘会立刻有完整度。", tags: ["零食盘", "分享感", "拍照友好"] }
    ];

    const categories = [
      { id: "all", label: "全部灵感", icon: "dashboard_customize" },
      { id: "hearty", label: "热盘主菜", icon: "local_fire_department" },
      { id: "fresh", label: "轻盈冷盘", icon: "eco" },
      { id: "night", label: "深夜救场", icon: "bedtime" },
      { id: "snack", label: "零食重组", icon: "local_pizza" }
    ];

    const state = { category: "all", liked: false };
    const device = document.getElementById("device");
    const categoriesEl = document.getElementById("categories");
    const interestRail = document.getElementById("interestRail");
    const tonightRail = document.getElementById("tonightRail");
    const detail = document.getElementById("detail");
    const fields = {
      image: document.getElementById("detailImage"),
      title: document.getElementById("detailTitle"),
      price: document.getElementById("detailPrice"),
      sheetTitle: document.getElementById("sheetTitle"),
      description: document.getElementById("detailDescription"),
      score: document.getElementById("detailScore"),
      duration: document.getElementById("detailDuration"),
      mood: document.getElementById("detailMood"),
      reason: document.getElementById("detailReason"),
      marketCopy: document.getElementById("detailMarketCopy"),
      tags: document.getElementById("detailTags")
    };

    function renderCategories() {
      categoriesEl.innerHTML = categories.map((item) => {
        const active = state.category === item.id ? " active" : "";
        return `<button type="button" class="cat${active}" data-category="${item.id}"><span class="material-symbols-outlined">${item.icon}</span><strong>${item.label}</strong></button>`;
      }).join("");
      categoriesEl.querySelectorAll("[data-category]").forEach((button) => {
        button.addEventListener("click", () => {
          state.category = button.dataset.category;
          renderCategories();
          renderRails();
        });
      });
    }

    function current(section) {
      return dishes.filter((dish) => dish.section === section && (state.category === "all" || dish.category.includes(state.category)));
    }

    function card(dish, compact) {
      const compactClass = compact ? " compact" : "";
      return `<button type="button" class="card${compactClass}" data-dish-id="${dish.id}"><div class="media"><img src="${dish.image}" alt="${dish.title}" loading="lazy" /><div class="badges"><span class="chip">${dish.badge}</span><span class="score"><span class="material-symbols-outlined">star</span>${dish.score}</span></div><div class="copy"><h4>${dish.title}</h4><p>${dish.subtitle}</p></div></div></button>`;
    }

    function bindCards(scope) {
      scope.querySelectorAll("[data-dish-id]").forEach((button) => {
        button.addEventListener("click", () => {
          const rail = button.closest(".rail");
          if (rail && rail.dataset.dragMoved === "true") return;
          openDetail(button.dataset.dishId);
        });
      });
    }

    function renderRails() {
      interestRail.innerHTML = current("interest").map((dish) => card(dish, false)).join("");
      tonightRail.innerHTML = current("tonight").map((dish) => card(dish, true)).join("");
      bindCards(interestRail);
      bindCards(tonightRail);
    }

    function attachElasticRail(rail) {
      if (!rail || rail.dataset.elasticBound === "true") return;
      rail.dataset.elasticBound = "true";
      let activePointerId = null;
      let startX = 0;
      let startScroll = 0;
      let lastX = 0;
      let lastTime = 0;
      let velocity = 0;
      let moved = false;
      let dragging = false;
      let currentOffset = 0;
      let springRaf = 0;

      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
      const maxScroll = () => Math.max(0, rail.scrollWidth - rail.clientWidth);
      const damp = (value) => Math.sign(value) * Math.pow(Math.abs(value), .9) * .3;

      const setOffset = (value) => {
        currentOffset = value;
        rail.style.transform = value ? `translate3d(${value}px,0,0)` : "";
      };

      const springBack = () => {
        cancelAnimationFrame(springRaf);
        if (!currentOffset) return;
        const step = () => {
          currentOffset *= .78;
          if (Math.abs(currentOffset) < .45) {
            setOffset(0);
            return;
          }
          setOffset(currentOffset);
          springRaf = requestAnimationFrame(step);
        };
        springRaf = requestAnimationFrame(step);
      };

      const finishDrag = (event) => {
        if (activePointerId === null) return;
        if (event && event.pointerId !== activePointerId) return;
        activePointerId = null;
        dragging = false;
        rail.style.scrollSnapType = "x mandatory";
        if (moved) {
          const momentum = velocity * 240;
          rail.scrollTo({ left: clamp(rail.scrollLeft + momentum, 0, maxScroll()), behavior: "smooth" });
          rail.dataset.dragMoved = "true";
          setTimeout(() => { delete rail.dataset.dragMoved; }, 220);
        }
        springBack();
      };

      rail.addEventListener("pointerdown", (event) => {
        if (event.button !== 0 || maxScroll() <= 0) return;
        cancelAnimationFrame(springRaf);
        activePointerId = event.pointerId;
        moved = false;
        dragging = false;
        startX = event.clientX;
        startScroll = rail.scrollLeft;
        lastX = event.clientX;
        lastTime = performance.now();
        velocity = 0;
        rail.style.scrollSnapType = "x mandatory";
      });

      rail.addEventListener("pointermove", (event) => {
        if (activePointerId === null || event.pointerId !== activePointerId) return;
        const dx = event.clientX - startX;
        if (!dragging && Math.abs(dx) > 14) {
          dragging = true;
          moved = true;
          rail.style.scrollSnapType = "none";
        }
        if (!dragging) return;
        const targetScroll = startScroll - dx;
        const max = maxScroll();
        const clamped = clamp(targetScroll, 0, max);
        const overshoot = targetScroll - clamped;
        rail.scrollLeft = clamped;
        setOffset(overshoot ? damp(-overshoot) : 0);
        const now = performance.now();
        const dt = Math.max(1, now - lastTime);
        velocity = (lastX - event.clientX) / dt;
        lastX = event.clientX;
        lastTime = now;
        event.preventDefault();
      });

      rail.addEventListener("pointerup", finishDrag);
      rail.addEventListener("pointercancel", finishDrag);
      rail.addEventListener("lostpointercapture", finishDrag);
    }

    function updateLike() {
      const icon = document.querySelector("#likeButton .material-symbols-outlined");
      if (!icon) return;
      if (state.liked) {
        icon.style.color = "#d4b178";
        icon.style.fontVariationSettings = '"FILL" 1, "wght" 500, "GRAD" 0, "opsz" 24';
      } else {
        icon.style.color = "";
        icon.style.fontVariationSettings = '"FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24';
      }
    }

    function openDetail(id) {
      const dish = dishes.find((item) => item.id === id);
      if (!dish) return;
      state.liked = false;
      fields.image.src = dish.image;
      fields.image.alt = dish.title;
      fields.title.textContent = dish.title;
      fields.price.textContent = dish.price;
      fields.sheetTitle.textContent = dish.title;
      fields.description.textContent = dish.description;
      fields.score.textContent = `${dish.score}分`;
      fields.duration.textContent = dish.duration;
      fields.mood.textContent = dish.mood;
      fields.reason.textContent = dish.reason;
      fields.marketCopy.textContent = dish.marketCopy;
      fields.tags.innerHTML = dish.tags.map((tag) => `<span class="tag">${tag}</span>`).join("");
      document.getElementById("directLink").href = `艺术的诞生.html?communityDish=${encodeURIComponent(dish.title)}`;
      updateLike();
      detail.setAttribute("aria-hidden", "false");
      device.classList.add("is-detail");
      detail.querySelector(".detail-scroll").scrollTo({ top: 0, behavior: "auto" });
    }

    function closeDetail() {
      device.classList.remove("is-detail", "is-decision-open");
      detail.setAttribute("aria-hidden", "true");
      document.getElementById("decisionSheet").classList.remove("markets-open");
      document.getElementById("decisionBackdrop").setAttribute("aria-hidden", "true");
    }

    function openDecision() {
      document.getElementById("decisionSheet").classList.remove("markets-open");
      document.getElementById("decisionBackdrop").setAttribute("aria-hidden", "false");
      device.classList.add("is-decision-open");
    }

    function closeDecision() {
      device.classList.remove("is-decision-open");
      document.getElementById("decisionSheet").classList.remove("markets-open");
      document.getElementById("decisionBackdrop").setAttribute("aria-hidden", "true");
    }

    document.getElementById("backDetail").addEventListener("click", closeDetail);
    document.getElementById("likeButton").addEventListener("click", () => {
      state.liked = !state.liked;
      updateLike();
    });
    document.getElementById("followButton").addEventListener("click", openDecision);
    document.getElementById("marketButton").addEventListener("click", () => {
      document.getElementById("decisionSheet").classList.add("markets-open");
    });
    document.getElementById("decisionBackdrop").addEventListener("click", (event) => {
      if (event.target === event.currentTarget) closeDecision();
    });
    document.getElementById("resetButton").addEventListener("click", () => {
      state.category = "all";
      renderCategories();
      renderRails();
    });

    renderCategories();
    renderRails();
    attachElasticRail(interestRail);
    attachElasticRail(tonightRail);
  </script>
