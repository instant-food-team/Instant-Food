      const normalized = text.replace(/\s+/g, "");
      const descriptiveMatch = normalized.match(/^(少量|适量|少许|若干)$/);
      if (descriptiveMatch) {
        return {
          count: 1,
          unit: descriptiveMatch[1]
        };
      }
      const match = normalized.match(/^(\d+)(.+)$/);
      return {
        count: match ? Number(match[1]) : 1,
        unit: match ? match[2] : "份"
      };
    }

    function normalizeMeasureUnit(rawUnit) {
      const unit = String(rawUnit || "").trim().toLowerCase();
      if (!unit) return "份";
      if (unit === "g") return "克";
      if (unit === "kg") return "公斤";
      if (unit === "ml") return "毫升";
      if (unit === "l") return "升";
      return String(rawUnit || "").trim();
    }

    function formatQuantityFull(count, unit) {
      const normalizedUnit = normalizeMeasureUnit(unit).replace(/\s+/g, "");
      if (!normalizedUnit) {
        return String(count || 1) + "份";
      }
      if (/^(少量|适量|少许|若干)$/.test(normalizedUnit)) {
        return normalizedUnit;
      }
      return String(count || 1) + normalizedUnit;
    }

    function formatQuantity(count, unit) {
      const normalizedUnit = normalizeMeasureUnit(unit).replace(/\s+/g, "");
      if (!normalizedUnit) {
        return String(count || 1) + "份";
      }

      const descriptiveMatch = normalizedUnit.match(/(少量|适量|少许|若干)/);
      if (descriptiveMatch) {
        return descriptiveMatch[1];
      }

      const cleanedUnit = normalizedUnit
        .replace(/^[约約]/, "")
        .replace(/(左右|大约|大概|约莫|约摸)/g, "")
        .replace(/[\(（].*?[\)）]/g, "");

      if (/^\d+(?:\.\d+)?(克|公斤|千克|毫升|升)$/.test(cleanedUnit)) {
        return cleanedUnit;
      }

      const primaryUnitMatch = cleanedUnit.match(/^(只|块|颗|个|瓣|份|条|根|片|把|串|朵|枚|杯|袋|碗|盘|盒|支|包|勺|毫升|克|公斤|千克|升)/);
      if (primaryUnitMatch) {
        return String(count || 1) + primaryUnitMatch[1];
      }

      return String(count || 1) + (cleanedUnit.charAt(0) || "份");
    }

    function normalizeIngredientName(text, fallback) {
      const cleaned = text.replace(/\s+/g, " ").trim();
      return cleaned || fallback;
    }

    function parseEstimatedQuantity(rawValue) {
      const normalized = String(rawValue || "").replace(/\s+/g, "");
      const descriptiveMatch = normalized.match(/(少量|适量|少许|若干)/);
      if (descriptiveMatch) {
        return {
          count: 1,
          unit: descriptiveMatch[1]
        };
      }

      const measuredMatch = normalized.match(/(?:约|約|大约|大概)?(\d+(?:\.\d+)?)(公斤|千克|kg|克|g|毫升|ml|升|l|颗|个|只|块|瓣|份|条|根|片|把|串|朵|枚|杯|袋|碗|盘|盒|支|包|勺)/i);
      if (measuredMatch) {
        return {
          count: Number(measuredMatch[1]) || 1,
          unit: normalizeMeasureUnit(measuredMatch[2])
        };
      }

      const match = normalized.match(/^(\d+)(.+)$/);
      return {
        count: match ? Number(match[1]) : 1,
        unit: match && match[2] ? normalizeMeasureUnit(match[2]) : "份"
      };
    }

    function mapRecognitionTechnique(rawTechnique) {
      const technique = String(rawTechnique || "").trim();
      if (!technique) {
        return "";
      }
      if (technique.includes("烤") || technique.includes("焗")) {
        return "烘烤";
      }
      if (technique.includes("煎")) {
        return "煎封";
      }
      if (technique.includes("炒") || technique.includes("爆")) {
        return "快炒";
      }
      if (technique.includes("煮") || technique.includes("炖") || technique.includes("慢")) {
        return "低温慢煮";
      }
      return "其他";
    }

    const ingredients = ingredientCards.map((card, index) => {
      const name = card.querySelector(".ingredient-name");
      const quantity = card.querySelector(".quantity-value");
      const buttons = card.querySelectorAll("button");
      const decrementButton = buttons[0];
      const incrementButton = buttons[1];
      const toggleButton = buttons[2];
      const parsedQuantity = parseQuantity(quantity.textContent);
      const defaults = ingredientDefaults[index] || {
        name: name.textContent.trim(),
        count: parsedQuantity.count,
        unit: parsedQuantity.unit,
        included: true
      };

      return {
        card,
        name,
        quantity,
        decrementButton,
        incrementButton,
        toggleButton,
        count: parsedQuantity.count,
        unit: parsedQuantity.unit,
        included: defaults.included,
        defaultName: defaults.name,
        manual: card.dataset.manual === "true" || defaults.manual === true
      };
    });

    function paintIngredient(item) {
      const isManualMuted = item.manual && !item.included;
      item.quantity.textContent = formatQuantity(item.count, item.unit);
      item.quantity.title = formatQuantityFull(item.count, item.unit);
      item.card.style.opacity = item.included ? "1" : (isManualMuted ? "0.78" : "0.46");
      item.name.style.color = item.included ? "#FFFFFF" : (isManualMuted ? "rgba(255, 255, 255, 0.82)" : "rgba(255, 255, 255, 0.56)");
      item.name.style.textDecoration = item.included || isManualMuted ? "none" : "line-through";
      item.quantity.style.color = item.included ? "#FFFFFF" : (isManualMuted ? "rgba(255, 255, 255, 0.66)" : "rgba(255, 255, 255, 0.48)");

      [item.decrementButton, item.incrementButton].forEach((button) => {
        button.disabled = !item.included;
        button.style.opacity = item.included ? "1" : "0.36";
        button.style.cursor = item.included ? "pointer" : "not-allowed";
      });

      item.toggleButton.setAttribute("aria-pressed", item.included ? "true" : "false");
      item.toggleButton.title = item.included ? "取消保留食材" : "保留食材";
      item.toggleButton.style.backgroundColor = item.included ? "#235347" : "rgba(255, 255, 255, 0.05)";
      item.toggleButton.style.color = item.included ? "#FFFFFF" : "rgba(255, 255, 255, 0.68)";
      item.toggleButton.style.borderColor = item.included ? "#235347" : "rgba(255, 255, 255, 0.1)";
      const toggleIcon = item.toggleButton.querySelector(".material-symbols-outlined");
      if (toggleIcon) {
        toggleIcon.textContent = item.included ? "check" : "close";
      }
    }

    function syncIngredientDefault(item, patch) {
      item.defaultName = patch.name;
      item.count = patch.count;
      item.unit = patch.unit;
      item.included = patch.included;
      item.name.textContent = normalizeIngredientName(patch.name, item.defaultName);
      paintIngredient(item);
    }

    ingredients.forEach((item) => {
      item.name.setAttribute("contenteditable", "true");
      item.name.setAttribute("spellcheck", "false");
      item.name.setAttribute("role", "textbox");
      item.name.setAttribute("aria-label", "食材名称，可编辑");
      item.name.textContent = normalizeIngredientName(item.name.textContent, item.defaultName);

      paintIngredient(item);

      item.name.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          item.name.blur();
        }
      });

      item.name.addEventListener("paste", (event) => {
        event.preventDefault();
        const pasted = (event.clipboardData || window.clipboardData)?.getData("text") || "";
        item.name.textContent = normalizeIngredientName(pasted, item.defaultName);
        item.name.blur();
      });

      item.name.addEventListener("blur", () => {
        item.name.textContent = normalizeIngredientName(item.name.textContent, item.defaultName);
        paintIngredient(item);
      });

      item.decrementButton.addEventListener("click", () => {
        if (!item.included) return;
        item.count = Math.max(1, item.count - 1);
        paintIngredient(item);
      });

      item.incrementButton.addEventListener("click", () => {
        if (!item.included) return;
        item.count += 1;
        paintIngredient(item);
      });

      item.toggleButton.addEventListener("click", () => {
        item.included = !item.included;
        paintIngredient(item);
      });
    });

    const chipGroups = [
      { key: "technique", buttons: Array.from(chipSections[0].querySelectorAll(".selection-chip")), multi: false },
      { key: "tools", buttons: Array.from(chipSections[1].querySelectorAll(".selection-chip")), multi: true },
      { key: "tastes", buttons: Array.from(chipSections[2].querySelectorAll(".selection-chip")), multi: true }
    ];

    function paintChipGroup(group) {
      group.buttons.forEach((button) => {
        const selected = group.selected.has(button.textContent.trim());
        button.style.borderColor = selected ? "#235347" : "rgba(255, 255, 255, 0.12)";
        button.style.backgroundColor = selected ? "#235347" : "rgba(28, 28, 30, 0.5)";
        button.style.color = "#FFFFFF";
        button.style.boxShadow = selected ? "0 4px 12px rgba(35, 83, 71, 0.36)" : "none";
      });
    }

    function enableHorizontalDrag(scroller) {
      if (!scroller) return;

      const state = {
        isPointerDown: false,
        isDragging: false,
        suppressClick: false,
        suppressClickTimer: null,
        pointerId: null,
        startX: 0,
        startY: 0,
        startScrollLeft: 0,
        lastX: 0,
        lastTime: 0,
        velocity: 0,
        overscroll: 0,
        momentumFrame: null,
        bounceTimer: null
      };

      function maxScroll() {
        return Math.max(0, scroller.scrollWidth - scroller.clientWidth);
      }

      function setOverscroll(offset) {
        state.overscroll = offset;
        scroller.style.transform = "translate3d(" + offset.toFixed(2) + "px, 0, 0)";
      }

      function clearAnimations() {
        if (state.momentumFrame) {
          cancelAnimationFrame(state.momentumFrame);
          state.momentumFrame = null;
        }

        if (state.bounceTimer) {
          clearTimeout(state.bounceTimer);
          state.bounceTimer = null;
        }

        if (state.suppressClickTimer) {
          clearTimeout(state.suppressClickTimer);
          state.suppressClickTimer = null;
        }

        scroller.style.transition = "";
      }

      function bounceBack() {
        if (!state.overscroll) return;
        clearAnimations();
        scroller.style.transition = "transform 460ms cubic-bezier(0.22, 1.12, 0.36, 1)";
        requestAnimationFrame(() => {
          setOverscroll(0);
        });
        state.bounceTimer = setTimeout(() => {
          scroller.style.transition = "";
          state.bounceTimer = null;
        }, 480);
      }

      function applyScroll(targetScrollLeft) {
        const limit = maxScroll();
        if (targetScrollLeft < 0) {
          scroller.scrollLeft = 0;
          setOverscroll(Math.min(42, -targetScrollLeft * 0.28));
          return;
        }

        if (targetScrollLeft > limit) {
          scroller.scrollLeft = limit;
          setOverscroll(-Math.min(42, (targetScrollLeft - limit) * 0.28));
          return;
        }

        if (state.overscroll !== 0) {
          setOverscroll(0);
        }

        scroller.scrollLeft = targetScrollLeft;
      }

      function startMomentum() {
        if (Math.abs(state.velocity) < 0.04) {
          bounceBack();
          return;
        }

        let currentVelocity = state.velocity * 18;

        function step() {
          currentVelocity *= 0.94;

          if (Math.abs(currentVelocity) < 0.18) {
            state.momentumFrame = null;
            bounceBack();
            return;
          }

          const nextScrollLeft = scroller.scrollLeft + currentVelocity;
          applyScroll(nextScrollLeft);

          if ((scroller.scrollLeft <= 0 && currentVelocity < 0) || (scroller.scrollLeft >= maxScroll() && currentVelocity > 0)) {
            currentVelocity *= 0.52;
            if (Math.abs(currentVelocity) < 0.6) {
              state.momentumFrame = null;
              bounceBack();
              return;
            }
          }

          state.momentumFrame = requestAnimationFrame(step);
        }

        state.momentumFrame = requestAnimationFrame(step);
      }

      function finishDrag() {
        if (state.pointerId !== null && typeof scroller.releasePointerCapture === "function") {
          try {
            scroller.releasePointerCapture(state.pointerId);
          } catch (error) {}
        }
        state.isPointerDown = false;
        state.pointerId = null;
        if (state.isDragging) {
          state.suppressClick = true;
          if (state.suppressClickTimer) {
            clearTimeout(state.suppressClickTimer);
          }
          state.suppressClickTimer = setTimeout(() => {
            state.suppressClick = false;
            state.suppressClickTimer = null;
          }, 220);
          startMomentum();
        } else {
          state.suppressClick = false;
          bounceBack();
        }
        window.requestAnimationFrame(() => {
          state.isDragging = false;
          scroller.classList.remove("is-dragging");
        });
      }

      scroller.addEventListener("pointerdown", (event) => {
        if (event.pointerType === "mouse" && event.button !== 0) return;
        clearAnimations();
        state.isPointerDown = true;
        state.isDragging = false;
        state.suppressClick = false;
        state.pointerId = event.pointerId;
        state.startX = event.clientX;
        state.startY = event.clientY;
        state.lastX = event.clientX;
        state.lastTime = performance.now();
        state.velocity = 0;
        state.startScrollLeft = scroller.scrollLeft;
      });

      scroller.addEventListener("pointermove", (event) => {
        if (!state.isPointerDown || state.pointerId !== event.pointerId) return;

        const now = performance.now();
        const deltaX = event.clientX - state.startX;
        const deltaY = event.clientY - state.startY;
        const deltaTime = Math.max(now - state.lastTime, 16);

        if (!state.isDragging) {
          if (Math.abs(deltaX) < 18 || Math.abs(deltaX) <= Math.abs(deltaY) * 1.25) return;
          state.isDragging = true;
          state.suppressClick = true;
          if (state.suppressClickTimer) {
            clearTimeout(state.suppressClickTimer);
          }
          state.suppressClickTimer = setTimeout(() => {
            state.suppressClick = false;
            state.suppressClickTimer = null;
          }, 220);
          if (typeof scroller.setPointerCapture === "function") {
            try {
              scroller.setPointerCapture(event.pointerId);
            } catch (error) {}
          }
          scroller.classList.add("is-dragging");
        }

        state.velocity = (state.lastX - event.clientX) / deltaTime;
        state.lastX = event.clientX;
        state.lastTime = now;

        applyScroll(state.startScrollLeft - deltaX);
      });

      scroller.addEventListener("pointerup", finishDrag);
      scroller.addEventListener("pointercancel", finishDrag);
      scroller.addEventListener("lostpointercapture", finishDrag);

      scroller.addEventListener("click", (event) => {
        if (!state.suppressClick) return;
        event.preventDefault();
        event.stopPropagation();
        state.suppressClick = false;
        if (state.suppressClickTimer) {
          clearTimeout(state.suppressClickTimer);
          state.suppressClickTimer = null;
        }
      }, true);
    }

    chipGroups.forEach((group) => {
      group.selected = new Set(
        group.buttons
          .filter((button) => (button.getAttribute("style") || "").includes("#235347"))
          .map((button) => button.textContent.trim())
      );

      function paintChip(button, selected) {
        button.style.borderColor = selected ? "#235347" : "rgba(255, 255, 255, 0.12)";
        button.style.backgroundColor = selected ? "#235347" : "rgba(28, 28, 30, 0.5)";
        button.style.color = "#FFFFFF";
        button.style.boxShadow = selected ? "0 4px 12px rgba(35, 83, 71, 0.36)" : "none";
      }

      function paintGroup() {
        group.buttons.forEach((button) => {
          paintChip(button, group.selected.has(button.textContent.trim()));
        });
      }

      group.buttons.forEach((button) => {
        button.addEventListener("click", () => {
          const value = button.textContent.trim();

          if (group.multi) {
            if (group.selected.has(value)) {
              group.selected.delete(value);
            } else {
              group.selected.add(value);
            }
          } else {
            group.selected.clear();
            group.selected.add(value);
          }

          paintGroup();
        });
      });

      paintGroup();
    });

    Array.from(document.querySelectorAll(".chip-scroll")).forEach(enableHorizontalDrag);

    function buildPayload() {
      return {
        ingredients: ingredients.map((item) => ({
          name: item.name.textContent.trim(),
          count: item.count,
          unit: item.unit,
          included: item.included
        })),
        technique: Array.from(chipGroups[0].selected)[0] || "",
        tools: Array.from(chipGroups[1].selected),
        tastes: Array.from(chipGroups[2].selected)
      };
    }

    function applyRecognitionResult(result) {
      const recognizedIngredients = Array.isArray(result && result.ingredients) ? result.ingredients : [];
      const nextDefaults = ingredientDefaults.map((item) => Object.assign({}, item));

      ingredients.forEach((item, index) => {
        if (item.manual) {
          return;
        }

        const recognized = recognizedIngredients[index];
        if (!recognized) {
          const fallback = {
            name: item.defaultName,
            count: item.count,
            unit: item.unit,
            included: item.included,
            manual: false
          };
          nextDefaults[index] = fallback;
          return;
        }

        const quantity = parseEstimatedQuantity(recognized.estimated_quantity);
        const patch = {
          name: normalizeIngredientName(recognized.name || item.defaultName, item.defaultName),
          count: quantity.count,
          unit: quantity.unit,
          included: true,
          manual: false
        };
        nextDefaults[index] = patch;
        syncIngredientDefault(item, patch);
      });

      const manualItem = ingredients.find((item) => item.manual);
      if (manualItem) {
        const remainingIngredients = recognizedIngredients.slice(Math.max(ingredients.length - 1, 0));
        const manualNames = remainingIngredients
          .map((item) => normalizeIngredientName(item && item.name, ""))
          .filter(Boolean);
        const patch = manualNames.length
          ? {
              name: manualNames.join(" / "),
              count: manualNames.length,
              unit: "项",
              included: true,
              manual: true
            }
          : {
              name: "其他食材",
              count: 1,
              unit: "份",
              included: false,
              manual: true
            };
        nextDefaults[nextDefaults.length - 1] = patch;
        syncIngredientDefault(manualItem, patch);
      }

      ingredientDefaults = nextDefaults;

      const mappedTechnique = mapRecognitionTechnique(result && result.cooking_method);
      if (mappedTechnique) {
        chipGroups[0].selected = new Set([mappedTechnique]);
        paintChipGroup(chipGroups[0]);
      }

      setRecognitionHint("已同步本次拍摄内容，可继续微调食材与技法。");
    }

    async function hydrateCapturedRecognition() {
      const capturedImage = bridge ? bridge.readCapturedImage(window) : "";
      if (!capturedImage) {
        setRecognitionHint("当前未检测到拍摄图，暂时使用示例食材。");
        return;
      }

      if (capturedPreviewImage) {
        capturedPreviewImage.src = capturedImage;
        capturedPreviewImage.alt = "本次拍摄的食材预览";
      }

      if (!bridge) {
        setRecognitionHint("已载入本次拍摄，当前页面未接入识别桥接。");
        return;
      }

      const apiBaseUrl = bridge.getApiBaseUrl(window);
      if (!apiBaseUrl) {
        setRecognitionHint("已载入本次拍摄，未配置本地 API，暂未自动识别。");
        return;
      }

      setRecognitionHint("已载入本次拍摄，正在同步识别结果…");

      try {
        const response = await bridge.fetchJson(
          bridge.buildApiUrl("/api/v1/recognize/image", window),
          {
            method: "POST",
            body: JSON.stringify({ image_base64: capturedImage })
          }
        );
        applyRecognitionResult(response && (response.result || response.recognition || response));
      } catch (error) {
        console.error("recognition-prefill-failed", error);
        setRecognitionHint("已载入本次拍摄，但自动识别失败，可手动确认食材。");
      }
    }

    function resetSelections() {
      ingredients.forEach((item, index) => {
        const defaults = ingredientDefaults[index] || {
          name: item.defaultName,
          count: item.count,
          unit: item.unit,
          included: item.included
        };

        item.name.textContent = defaults.name;
        item.count = defaults.count;
        item.unit = defaults.unit;
        item.included = defaults.included;
        paintIngredient(item);
      });

      chipGroups[0].selected = new Set(["烘烤"]);
      chipGroups[1].selected = new Set(["烤盘", "铸铁锅"]);
      chipGroups[2].selected = new Set(["辣"]);
      chipGroups.forEach((group) => {
        paintChipGroup(group);
      });
    }

    resetButton.addEventListener("click", () => {
      const shouldReset = window.confirm("重置当前食材名称、数量、技法和味觉选择？");
      if (shouldReset) {
        resetSelections();
      }
    });

    startGenerateButton.addEventListener("click", () => {
      const payload = buildPayload();
      const hasIngredient = payload.ingredients.some((item) => item.included);

      if (!hasIngredient) {
        window.alert("请至少保留一个食材，再进入确认菜单。");
        return;
      }

      sessionStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      window.location.href = "加载过渡.html";
    });

    hydrateCapturedRecognition();
  })();
</script>
</body></html>
