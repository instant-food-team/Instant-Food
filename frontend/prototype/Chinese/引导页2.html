<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拍立食 | 引导页2</title>
  <link rel="stylesheet" href="wechat-unified.css">
  <link rel="stylesheet" href="onboarding-shared.css">
  <style data-phase5-baseline>
    :root {
      color-scheme: dark;
      --brand-primary: #235347;
      --brand-accent: #8EB69B;
      --space-8: 8px;
      --space-12: 12px;
      --space-16: 16px;
      --space-20: 20px;
      --space-24: 24px;
      --space-32: 32px;
      --radius-device: 40px;
      --radius-card: 28px;
      --radius-pill: 999px;
      --font-display: "SF Pro Display", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --font-body: "SF Pro Text", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --motion-fast: 180ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    html, body { font-family: var(--font-body); }
    h1, h2, h3, h4, .font-display, [data-display] { font-family: var(--font-display); }
    button, .chip, .selection-chip, .nav-item, .icon, .hero-tab {
      transition: transform var(--motion-fast), opacity var(--motion-fast), background-color var(--motion-fast), border-color var(--motion-fast), box-shadow var(--motion-fast);
    }
    button:active, .selection-chip:active, .hero-tab:active { transform: scale(0.98); }
    .text-primary { color: var(--brand-primary) !important; }
    .bg-primary { background-color: var(--brand-primary) !important; }
    .border-primary { border-color: var(--brand-primary) !important; }
  </style>
</head>
<body class="onboarding-body">
  <div class="phone-shell">
    <div class="phone-screen">
            <main class="onboarding-page" data-onboarding-page data-prev="引导页1.html" data-next="引导页3.html" style="--bg-position: 58% 34%; --bg-scale: 1.58; --bg-brightness: 0.84;">
        <div class="page-background">
          <img
            src="../../assets/backgrounds/2.jpg"
            alt="暖调海鲜意面餐桌"
          >
        </div>

        <header class="page-header">
          <div class="login-card" data-login-card>
            <div class="login-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2M12 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0Z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
              </svg>
              <span class="login-dot"></span>
            </div>
            <span class="login-label">登录</span>
          </div>
        </header>

        <section class="page-body">
          <div class="hero-copy hero-copy-cn">
            <div class="hero-glyph-frame" aria-hidden="true">
              <span class="hero-corner hero-corner-tl"></span>
              <span class="hero-corner hero-corner-tr"></span>
              <span class="hero-corner hero-corner-bl"></span>
              <span class="hero-corner hero-corner-br"></span>
              <span class="hero-glyph">煮</span>
              <span class="hero-seal"></span>
            </div>
            <div class="hero-vertical-stack">
              <p class="hero-vertical-main">余味回锅，再成一席</p>
              <p class="hero-vertical-sub">把今天剩下的风味，重新煮成值得上桌的一餐</p>
            </div>
          </div>

          <div class="page-footer">
            <div class="pager-dots" aria-label="引导页进度">
              <span class="pager-dot"></span>
              <span class="pager-dot is-active"></span>
              <span class="pager-dot"></span>
            </div>

            <div class="go-shell" data-go-shell data-idle-label="向右滑动" data-ready-label="松手进入">
              <div class="go-rail" data-go-rail>
                <div class="go-trail" aria-hidden="true"></div>
                <div class="go-hint" aria-hidden="true">
                  <span></span>
                  <span></span>
                </div>
                <button class="go-knob" data-go-knob type="button">即刻料理</button>
              </div>
              <div class="go-label" data-go-label>向右滑动</div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>
  <script src="onboarding-shared.js"></script>
</body>
</html>
