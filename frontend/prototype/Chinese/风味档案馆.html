<script>
  (() => {
    const shellScroller = document.querySelector(".nexus-shell-screen");
    const deviceShell = document.querySelector(".nexus-shell-device");
    const dockNode = deviceShell?.querySelector("nav.bottom-dock");
    if (deviceShell && shellScroller && dockNode && shellScroller.contains(dockNode)) {
      deviceShell.appendChild(dockNode);
    }
    const grid = document.querySelector(".masonry-grid");
    const fallbackScroller = document.scrollingElement || document.documentElement;
    if (deviceShell && !deviceShell.querySelector(".dock-shadow-mask")) {
      const mask = document.createElement("div");
      mask.className = "dock-shadow-mask";
      mask.style.zIndex = "14";
      const dock = deviceShell.querySelector("nav.bottom-dock");
      if (dock) {
        deviceShell.insertBefore(mask, dock);
      } else {
        deviceShell.appendChild(mask);
      }
    }
    if (fallbackScroller) {
      fallbackScroller.scrollTop = 0;
    }
    if (shellScroller) {
      shellScroller.scrollTop = 0;
    }
    const metricTargets = [shellScroller, fallbackScroller].filter((node, index, arr) => node && arr.indexOf(node) === index);
    const listenerTargets = [shellScroller, fallbackScroller, document, window].filter((node, index, arr) => node && arr.indexOf(node) === index);
    const primaryScroller = metricTargets[0];
    if (!grid || !primaryScroller) {
      return;
    }

    const catalog = [
      { title: "黄油肋排", time: "10 月 12 日 02:34", tags: ["浓郁", "罪恶感"], ratio: 122, image: "../../assets/backgrounds/5.png" },
      { title: "夜幕寿司", time: "10 月 12 日 02:34", tags: ["深夜"], ratio: 156, image: "../../assets/backgrounds/1.png" },
      { title: "焦香牛排", time: "10 月 12 日 02:34", tags: ["浓郁"], ratio: 108, image: "../../assets/backgrounds/cd6773b8370a4aeb11f456bd974ed96c.jpg" },
      { title: "双层汉堡", time: "10 月 12 日 02:34", tags: ["罪恶感", "深夜"], ratio: 142, image: "../../assets/backgrounds/2.jpg" },
      { title: "热拿铁", time: "10 月 12 日 02:34", tags: ["深夜"], ratio: 114, image: "../../assets/backgrounds/3.jpg" },
      { title: "黄油扇贝", time: "10 月 11 日 21:18", tags: ["浓郁"], ratio: 136, image: "../../assets/backgrounds/95dc01ddadd7c54292be548b216e61d8.jpg" },
      { title: "深夜热盘", time: "10 月 10 日 23:40", tags: ["深夜"], ratio: 148, image: "../../assets/backgrounds/4.jpg" },
      { title: "焦边留白盘", time: "10 月 09 日 20:18", tags: ["浓郁"], ratio: 118, image: "../../assets/backgrounds/5.png" }
    ];

    const normalizeTags = (title) => {
      if (title.includes("拿铁") || title.includes("寿司")) return ["深夜"];
      if (title.includes("汉堡")) return ["罪恶感", "深夜"];
      if (title.includes("牛") || title.includes("肋") || title.includes("扇贝")) return ["浓郁"];
      return [];
    };

    const syncCardMeta = (card, index) => {
      const data = catalog[index % catalog.length];
      const titleNode = card.querySelector(".archive-card-title");
      const timeNode = card.querySelector(".archive-card-time span:last-child");
      const imageNode = card.querySelector("img");
      const ratioNode = card.querySelector(".relative.w-full");
      if (titleNode) titleNode.textContent = data.title;
      if (timeNode) timeNode.textContent = data.time;
      if (imageNode) {
        imageNode.alt = data.title;
        imageNode.src = data.image;
      }
      if (ratioNode) ratioNode.style.paddingBottom = data.ratio + "%";
      card.dataset.archiveTags = JSON.stringify(data.tags || normalizeTags(data.title));
      return card;
    };

    const initialCards = Array.from(grid.querySelectorAll(".masonry-item"));
    if (!initialCards.length) {
      return;
    }

    initialCards.forEach((card, index) => {
      syncCardMeta(card, index);
    });

    const leftLane = document.createElement("div");
    const rightLane = document.createElement("div");
    leftLane.className = "archive-waterfall-lane";
    rightLane.className = "archive-waterfall-lane";
    grid.innerHTML = "";
    grid.append(leftLane, rightLane);

    let laneTurn = 0;
    const appendToWaterfall = (card) => {
      (laneTurn++ % 2 === 0 ? leftLane : rightLane).appendChild(card);
    };

    initialCards.forEach((card) => appendToWaterfall(card));

    const templates = Array.from(grid.querySelectorAll(".masonry-item")).map((item) => item.cloneNode(true));
    if (!templates.length) {
      return;
    }

    const assignTags = () => {
      Array.from(grid.querySelectorAll(".masonry-item")).forEach((card) => {
        if (card.dataset.archiveTags) return;
        const title = card.querySelector(".archive-card-title")?.textContent?.trim() || "";
        card.dataset.archiveTags = JSON.stringify(normalizeTags(title));
      });
    };

    const applyFilter = (label) => {
      const buttons = Array.from(document.querySelectorAll(".archive-filter"));
      const allLabel = buttons[0]?.textContent?.trim() || "全部档案";
      buttons.forEach((btn) => btn.classList.toggle("active", btn.textContent.trim() === label));
      Array.from(grid.querySelectorAll(".masonry-item")).forEach((card) => {
        const tags = JSON.parse(card.dataset.archiveTags || "[]");
        const visible = label === allLabel || tags.includes(label);
        card.style.display = visible ? "" : "none";
      });
    };

    let cursor = 0;
    let exhausted = false;
    const MAX_ARCHIVE_CARDS = 10;
    const appendBatch = (count = 4) => {
      const currentCount = grid.querySelectorAll(".masonry-item").length;
      const remaining = MAX_ARCHIVE_CARDS - currentCount;
      if (remaining <= 0) {
        exhausted = true;
        return;
      }
      const nextCount = Math.min(count, remaining);
      for (let i = 0; i < nextCount; i += 1) {
        const template = templates[(cursor + i) % templates.length];
        appendToWaterfall(syncCardMeta(template.cloneNode(true), cursor + i));
      }
      cursor += nextCount;
      if (grid.querySelectorAll(".masonry-item").length >= MAX_ARCHIVE_CARDS) {
        exhausted = true;
      }
      const active = document.querySelector(".archive-filter.active")?.textContent?.trim() || "全部档案";
      applyFilter(active);
    };

    const onScrollNearBottom = () => {
      if (exhausted) return;
      const scrolled = Math.max(...metricTargets.map((target) => target.scrollTop || 0));
      if (scrolled < 8) return;
      const remain = Math.min(...metricTargets.map((target) => target.scrollHeight - target.scrollTop - target.clientHeight));
      if (remain < 140) appendBatch(4);
    };

    let ticking = false;
    const onScroll = () => {
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(() => {
        ticking = false;
        onScrollNearBottom();
      });
    };
    listenerTargets.forEach((target) => target.addEventListener("scroll", onScroll, { passive: true }));

    const filterButtons = Array.from(document.querySelectorAll(".archive-filter"));
    filterButtons.forEach((button) => {
      button.addEventListener("click", (event) => {
        event.preventDefault();
        applyFilter(button.textContent.trim());
      });
    });

    assignTags();
    const active = document.querySelector(".archive-filter.active")?.textContent?.trim() || "全部档案";
    applyFilter(active);
  })();
</script>
</body></html>
