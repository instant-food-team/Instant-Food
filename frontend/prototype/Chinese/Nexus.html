<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拍立食 | 中枢主页</title>
  <link rel="stylesheet" href="wechat-unified.css" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,400,0..1,0&display=swap" rel="stylesheet" />
  <style>
    :root {
      --color-bg-base: #000000;
      --color-bg-surface: #161616;
      --color-bg-surface-2: #1c1c1e;
      --color-brand-primary: #235347;
      --color-brand-accent: #8eb69b;
      --color-text-primary: #ffffff;
      --color-text-secondary: #8e8e93;
      --color-text-muted: rgba(255, 255, 255, 0.7);
      --color-border-subtle: rgba(255, 255, 255, 0.1);
      --color-border-soft: rgba(255, 255, 255, 0.05);
      --font-display: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --font-body: "SF Pro Text", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 20px;
      --space-6: 24px;
      --space-7: 32px;
      --radius-card: 28px;
      --radius-pill: 999px;
      --shadow-deep: 0 30px 60px rgba(0, 0, 0, 0.45);
      --shadow-soft: 0 18px 40px rgba(0, 0, 0, 0.28);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 15% 10%, rgba(35, 83, 71, 0.34) 0%, rgba(35, 83, 71, 0) 28%),
        radial-gradient(circle at 82% 14%, rgba(142, 182, 155, 0.14) 0%, rgba(142, 182, 155, 0) 22%),
        radial-gradient(circle at 50% 100%, rgba(35, 83, 71, 0.18) 0%, rgba(35, 83, 71, 0) 36%),
        linear-gradient(180deg, #050505 0%, #000000 100%);
      color: var(--color-text-primary);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body { display: flex; justify-content: center; padding: 20px; overflow: hidden; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }
    .material-symbols-outlined {
      font-family: "Material Symbols Outlined";
      font-weight: normal;
      font-style: normal;
      font-size: 24px;
      line-height: 1;
      letter-spacing: normal;
      text-transform: none;
      display: inline-block;
      white-space: nowrap;
      word-wrap: normal;
      direction: ltr;
      -webkit-font-smoothing: antialiased;
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
    }

    .device {
      position: relative;
      width: min(100%, 414px);
      min-height: calc(100vh - 40px);
      display: flex;
      flex-direction: column;
      border-radius: 40px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(28, 28, 30, 0.92) 0%, rgba(0, 0, 0, 0.98) 100%), #000;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: var(--shadow-deep), inset 0 1px 0 rgba(255, 255, 255, 0.06);
      isolation: isolate;
    }
    .device::before,
    .device::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
      z-index: 0;
    }
    .device::before {
      width: 220px;
      height: 220px;
      top: 72px;
      right: -52px;
      background: rgba(35, 83, 71, 0.24);
    }
    .device::after {
      width: 250px;
      height: 250px;
      bottom: 132px;
      left: -96px;
      background: rgba(142, 182, 155, 0.1);
    }

    .status-bar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.92);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.94) 40%, rgba(0, 0, 0, 0));
    }
    .status-icons { display: flex; align-items: center; gap: 8px; opacity: 0.82; }
    .status-icons span {
      display: inline-flex;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.22);
    }

    .screen {
      position: relative;
      z-index: 1;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overscroll-behavior-y: contain;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 6px 20px 124px;
    }
    .screen::-webkit-scrollbar { display: none; }
    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 12px;
    }
    .topbar-copy {
      min-width: 0;
      padding-top: 2px;
    }
    .overline {
      margin: 0 0 6px;
      color: var(--color-brand-accent);
      font-size: 12px;
      line-height: 16px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.95;
    }
    .topbar h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 36px;
      line-height: 42px;
      letter-spacing: -0.05em;
      font-weight: 700;
    }
    .topbar p {
      margin: 4px 0 0;
      color: var(--color-text-secondary);
      font-size: 13px;
      line-height: 18px;
    }
    .topbar-stat {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 8px;
      width: 84px;
      min-height: 98px;
      margin-top: 2px;
      padding: 14px 12px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03)),
        linear-gradient(180deg, rgba(32, 32, 36, 0.92), rgba(20, 20, 22, 0.98));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.09), var(--shadow-soft);
    }
    .topbar-stat .material-symbols-outlined {
      font-size: 20px;
      color: rgba(255, 255, 255, 0.72);
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 20;
    }
    .topbar-stat strong {
      display: block;
      font-family: var(--font-display);
      font-size: 28px;
      line-height: 28px;
      letter-spacing: -0.05em;
      font-weight: 700;
    }
    .topbar-stat small {
      display: block;
      margin-top: -2px;
      color: var(--color-text-secondary);
      font-size: 10px;
      line-height: 13px;
    }

    .panel {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius-card);
      border: 1px solid var(--color-border-subtle);
      background: linear-gradient(180deg, rgba(22, 22, 22, 0.94), rgba(11, 11, 11, 0.98));
      box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .section { margin-bottom: 24px; }
    .section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
    }
    .section-head h2,
    .section-head h3 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 20px;
      line-height: 26px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .section-head p,
    .section-head a {
      margin: 0;
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 16px;
      flex: 0 0 auto;
    }

    .hero-tabs {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .hero-tabs::-webkit-scrollbar { display: none; }
    .hero-tab {
      flex: 0 0 auto;
      min-height: 42px;
      padding: 0 18px;
      border-radius: var(--radius-pill);
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.34);
      font-size: 13px;
      line-height: 16px;
      font-weight: 600;
      font-family: inherit;
    }
    .hero-tab.active {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      color: var(--color-text-primary);
    }
    .hero { min-height: 334px; margin-bottom: 24px; background: #0d0d0d; }
    .hero-media,
    .task-feature-media,
    .archive-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .hero-media {
      object-position: center 38%;
      filter: saturate(0.9) contrast(1.03);
    }
    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(8, 8, 10, 0.12), rgba(8, 8, 10, 0.2) 28%, rgba(8, 8, 10, 0.8) 100%),
        radial-gradient(circle at 84% 18%, rgba(142, 182, 155, 0.16) 0%, rgba(142, 182, 155, 0) 26%),
        radial-gradient(circle at 18% 84%, rgba(35, 83, 71, 0.32) 0%, rgba(35, 83, 71, 0) 28%);
      z-index: 1;
    }
    .hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      min-height: 334px;
      padding: 20px;
    }
    .hero-badge {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      width: 64px;
      min-height: 64px;
      border-radius: 20px;
      background: rgba(18, 18, 22, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }
    .hero-badge strong {
      display: block;
      font-family: var(--font-display);
      font-size: 18px;
      line-height: 18px;
      letter-spacing: -0.04em;
      font-weight: 700;
    }
    .hero-badge span {
      color: rgba(255, 255, 255, 0.58);
      font-size: 10px;
      line-height: 12px;
    }
    .hero-copy h2 {
      margin: 0 0 4px;
      max-width: 190px;
      font-family: var(--font-display);
      font-size: 30px;
      line-height: 32px;
      letter-spacing: -0.05em;
      font-weight: 700;
      text-shadow: 0 8px 24px rgba(0, 0, 0, 0.34);
    }
    .hero-copy p {
      margin: 0;
      color: rgba(255, 255, 255, 0.74);
      font-size: 14px;
      line-height: 18px;
    }
    .hero-copy {
      margin-top: auto;
    }
    .topbar-stat,
    .hero-tab,
    .input-card,
    .task-card,
    .mini-link-card,
    .archive-card,
    .nav-item { transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease; }
    .topbar-stat:hover,
    .hero-tab:hover,
    .input-card:hover,
    .task-card:hover,
    .mini-link-card:hover,
    .archive-card:hover,
    .nav-item:hover { transform: translateY(-1px); }
    .bottom-dock {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 8px;
      z-index: 7;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      align-items: end;
      gap: 6px;
      padding: 10px 8px 8px;
      border-radius: 28px;
      background: rgba(6, 6, 6, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.46), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 10.5px;
      line-height: 12px;
      letter-spacing: 0.01em;
      font-weight: 500;
      transition: color 0.2s ease, transform 0.2s ease;
    }
    .bottom-nav-item span:last-child {
      display: block;
      min-width: 32px;
      text-align: center;
    }
    .bottom-nav-item strong {
      width: 36px;
      height: 36px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      font-size: 0;
      line-height: 1;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.82);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .bottom-nav-item strong .material-symbols-outlined {
      font-size: 18px;
      color: currentColor;
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 18;
    }
    .bottom-nav-item:hover {
      color: rgba(255, 255, 255, 0.82);
      transform: translateY(-1px);
    }
    .bottom-nav-item.active {
      color: var(--color-text-primary);
    }
    .bottom-nav-item.active strong {
      background: linear-gradient(180deg, rgba(55, 118, 101, 0.96), rgba(35, 83, 71, 0.98));
      border-color: rgba(142, 182, 155, 0.26);
      color: var(--color-text-primary);
      box-shadow: 0 8px 16px rgba(35, 83, 71, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }
    .bottom-nav-item.active strong .material-symbols-outlined {
      font-variation-settings: "FILL" 1, "wght" 500, "GRAD" 0, "opsz" 18;
    }
    .bottom-plus-wrap {
      display: flex;
      justify-content: center;
      position: relative;
      top: -18px;
    }
    .bottom-plus {
      width: 52px;
      height: 52px;
      aspect-ratio: 1 / 1;
      border: 0;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(52, 106, 91, 0.98), rgba(35, 83, 71, 0.98));
      color: var(--color-text-primary);
      box-shadow: 0 10px 22px rgba(35, 83, 71, 0.34), 0 0 24px rgba(35, 83, 71, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.12);
      cursor: pointer;
      transition: transform 0.24s ease, box-shadow 0.24s ease;
    }
    .bottom-plus .material-symbols-outlined {
      font-size: 22px;
      line-height: 1;
      transform: translateY(-1px);
      font-variation-settings: "FILL" 1, "wght" 500, "GRAD" 0, "opsz" 22;
      transition: transform 0.24s ease;
    }
    .bottom-plus:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 26px rgba(35, 83, 71, 0.38), 0 0 26px rgba(35, 83, 71, 0.16);
    }
    .task-grid { display: grid; gap: 12px; }
    .task-card {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01)),
        linear-gradient(180deg, rgba(21, 21, 21, 0.96), rgba(9, 9, 9, 0.98));
      box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
    .task-feature { min-height: 178px; }
    .task-feature::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.14), rgba(0, 0, 0, 0.22) 40%, rgba(0, 0, 0, 0.84) 100%);
      z-index: 1;
    }
    .task-feature-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 178px;
      padding: 18px;
    }
    .meta-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .meta-chip,
    .archive-copy .pill {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: var(--radius-pill);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.88);
      font-size: 12px;
      line-height: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .task-feature-content h3,
    .task-mini-content h3,
    .archive-copy h4,
    .teaser h4 {
      margin: 0;
      font-family: var(--font-display);
      letter-spacing: -0.02em;
    }
    .task-feature-content .meta-row {
      position: absolute;
      top: 14px;
      left: 14px;
      margin: 0;
    }
    .task-feature-content h3 {
      max-width: 204px;
      overflow: hidden;
      font-size: 17px;
      line-height: 20px;
      margin-bottom: 3px;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .task-feature-content p {
      margin: 0;
      max-width: 190px;
      overflow: hidden;
      color: rgba(255, 255, 255, 0.76);
      font-size: 11px;
      line-height: 14px;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .task-mini-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .task-mini {
      min-height: 122px;
      padding: 12px;
    }
    .task-mini-content {
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 98px;
    }
    .task-mini-content h3 {
      max-width: 104px;
      overflow: hidden;
      font-size: 13px;
      line-height: 15px;
      margin-bottom: 3px;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .task-mini .meta-row {
      position: absolute;
      top: 12px;
      right: 12px;
      margin: 0;
    }
    .task-mini-content p {
      margin: 0;
      max-width: 104px;
      overflow: hidden;
      color: var(--color-text-muted);
      font-size: 11px;
      line-height: 14px;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .task-mini-grid .task-card:nth-child(1) {
      background:
        linear-gradient(180deg, rgba(8, 8, 8, 0.28), rgba(8, 8, 8, 0.92)),
        url("https://lh3.googleusercontent.com/aida-public/AB6AXuBRk2tMbG8XDqd7mcwHKcWgiNCP4LJxtz7CMAzHhME1rZ7Y1cIzTjnRfVNZIgwhkckzRWUWzNhLtl0ZN5dXpLfPZhcOe2GCoJQLi4OSojZ-JFaTTpKnbW-3BfDdqtp_TCbnr9yNFzMPvDEdy2wCM9atanqp-Qq-sQV-TNxbOIz1Q5KHD4r9D4XoBisAWnT-Js2uCMFAvHENlaHR-pjw4oATtLgPLwArM7UmF_YQRCFDK29gG4xwMw2DwHVDc8xnlwgGay8DUvWHrj8") center/cover no-repeat;
    }
    .task-mini-grid .task-card:nth-child(2) {
      background:
        linear-gradient(180deg, rgba(8, 8, 8, 0.24), rgba(8, 8, 8, 0.9)),
        url("https://lh3.googleusercontent.com/aida-public/AB6AXuAjLI7npUjidaH7N48q-c8XHkMi0CAzysurMZl3UwHbmAcqsbupIYlJKcNFEu5djck9PnNojYdKeep-Iyv9n3peo7ULy-OCz8FcZmO1Lq-8wG8VB2IFA7JgQZA4W6GwGt8yiBt7JnE7x1D9vRTAtQ267oseKpYZKEXkY_JdwDbHTm8T3RgX4Q1S3-gTui6ebXbkaLvrXEIPkqnnjxi51qrEOuiZdg7cpXzDIZ1_dLtZwlRNaIwdCDaEK7191fheDZpkpYAb1LnLDek") center/cover no-repeat;
    }

    .mini-link-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .mini-link-card {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 70px;
      padding: 14px 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }
        .mini-link-icon {
      flex: 0 0 auto;
      width: 36px;
      height: 36px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(35, 83, 71, 0.18);
      border: 1px solid rgba(142, 182, 155, 0.14);
      color: var(--color-brand-accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .mini-link-card strong {
      display: block;
      font-size: 14px;
      line-height: 18px;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .mini-link-card span {
      display: block;
      color: var(--color-text-secondary);
      font-size: 12px;
      line-height: 16px;
    }

    .archive-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 4px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
    }
    .archive-row::-webkit-scrollbar { display: none; }
    .archive-card {
      position: relative;
      flex: 0 0 160px;
      height: 214px;
      overflow: hidden;
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: #111;
      scroll-snap-align: start;
      box-shadow: var(--shadow-soft);
    }
    .archive-card.wide { flex-basis: 244px; }
    .archive-card::before {
      content: "";

        heroBadgeLabel.textContent = state.badgeLabel;
        heroTitle.textContent = state.heroTitle;
        heroSubtitle.textContent = state.heroSubtitle;
        featureSectionTitle.textContent = state.tabLabel;
        featureImage.src = state.featureImage;
        featureImage.alt = state.featureAlt;
        featureMetaPrimary.textContent = state.featureMetaPrimary;
        featureMetaSecondary.textContent = state.featureMetaSecondary;
        featureTitle.textContent = state.featureTitle;
        featureCopy.textContent = state.featureCopy;

        animateSwap([
          heroImage,
          heroBadge,
          heroTitle,
          heroSubtitle,
          featureSectionTitle,
          featureImage,
          featureMetaPrimary,
          featureMetaSecondary,
          featureTitle,
          featureCopy
        ]);
      }

      heroTabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          applyHeroState(tab.dataset.heroKey);
        });
      });
    })();
  </script>
</body>
</html>
