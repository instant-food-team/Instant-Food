<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拍立食 | 阶段4</title>
  <link rel="stylesheet" href="wechat-unified.css" />
  <style>
    :root {
      color-scheme: dark;
      --brand-primary: #235347;
      --brand-accent: #8EB69B;
      --space-8: 8px;
      --space-12: 12px;
      --space-16: 16px;
      --space-20: 20px;
      --space-24: 24px;
      --space-32: 32px;
      --radius-device: 40px;
      --radius-card: 28px;
      --radius-pill: 999px;
      --stage4-bg:
        radial-gradient(circle at 15% 10%, rgba(35, 83, 71, 0.34) 0%, rgba(35, 83, 71, 0) 28%),
        radial-gradient(circle at 82% 14%, rgba(142, 182, 155, 0.14) 0%, rgba(142, 182, 155, 0) 22%),
        radial-gradient(circle at 50% 100%, rgba(35, 83, 71, 0.18) 0%, rgba(35, 83, 71, 0) 36%),
        linear-gradient(180deg, #050505 0%, #000000 100%);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      --text-primary: rgba(255, 255, 255, 0.96);
      --text-secondary: rgba(255, 255, 255, 0.7);
      --accent: #8eb69b;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #000; }
    body {
      min-height: 100dvh;
      background: var(--stage4-bg);
      color: var(--text-primary);
      font-family: "SF Pro Text", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }

    .stage4-root {
      position: relative;
      width: 100%;
      min-height: 100dvh;
      isolation: isolate;
    }

    .stage4-frame {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100dvh;
      border: 0;
      display: block;
      background: transparent;
      opacity: 1;
      transition: opacity 220ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .stage4-frame.is-switching {
      opacity: 0.08;
    }

    .stage4-veil {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 220ms cubic-bezier(0.22, 1, 0.36, 1);
      background: radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0) 28%), rgba(6, 7, 9, 0.18);
      backdrop-filter: blur(8px) saturate(1.08);
      -webkit-backdrop-filter: blur(8px) saturate(1.08);
      z-index: 20;
    }

    .stage4-veil.is-visible {
      opacity: 1;
    }

    .stage4-sheet-backdrop {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: var(--space-20);
      background: rgba(2, 3, 4, 0.24);
      backdrop-filter: blur(10px) saturate(1.08);
      -webkit-backdrop-filter: blur(10px) saturate(1.08);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
      z-index: 60;
    }

    .stage4-sheet-backdrop.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .stage4-sheet {
      position: relative;
      z-index: 1;
      width: min(100%, 414px);
      border-radius: var(--radius-card);
      padding: var(--space-20) var(--space-20) var(--space-16);
      background: linear-gradient(180deg, rgba(28, 31, 34, 0.86), rgba(12, 13, 15, 0.92));
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.14);
      transform: translateY(var(--space-24)) scale(0.98);
      transition: transform 240ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .stage4-sheet-backdrop.is-visible .stage4-sheet {
      transform: translateY(0) scale(1);
    }

    .stage4-sheet-handle {
      width: 44px;
      height: 5px;
      margin: 0 auto var(--space-12);
      border-radius: var(--radius-pill);
      background: rgba(255, 255, 255, 0.16);
    }

    .stage4-sheet-title {
      margin: 0;
      font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: -0.03em;
      font-weight: 650;
      color: var(--text-primary);
    }

    .stage4-sheet-copy {
      margin: var(--space-12) 0 0;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .stage4-sheet-actions {
      display: flex;
      gap: var(--space-12);
      margin-top: var(--space-16);
    }

    .stage4-sheet-button {
      flex: 1;
      min-height: 56px;
      border: 0;
      border-radius: var(--radius-pill);
      font: inherit;
      font-size: 15px;
      line-height: 1;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: transform 160ms ease;
    }

    .stage4-sheet-button:active {
      transform: scale(0.985);
    }

    .stage4-sheet-button.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stage4-sheet-button.primary {
      background: linear-gradient(135deg, rgba(142, 182, 155, 0.94), rgba(35, 83, 71, 0.96));
      color: #fff;
      box-shadow: 0 14px 32px rgba(35, 83, 71, 0.28);
    }

    .stage4-toast {
      position: fixed;
      left: 50%;
      bottom: var(--space-32);
      z-index: 70;
      min-width: 236px;
      max-width: min(88vw, 360px);
      padding: var(--space-12) var(--space-16);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(28, 31, 34, 0.88), rgba(12, 13, 15, 0.94));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px) saturate(1.08);
      -webkit-backdrop-filter: blur(16px) saturate(1.08);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
      letter-spacing: -0.01em;
      transform: translate(-50%, var(--space-24));
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .stage4-toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .stage4-toast strong {
      display: block;
      margin-bottom: 4px;
      color: #fff;
      font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 620;
    }
  </style>
  <style data-phase5-baseline>
    :root {
      color-scheme: dark;
      --brand-primary: #235347;
      --brand-accent: #8EB69B;
      --space-8: 8px;
      --space-12: 12px;
      --space-16: 16px;
      --space-20: 20px;
      --space-24: 24px;
      --space-32: 32px;
      --radius-device: 40px;
      --radius-card: 28px;
      --radius-pill: 999px;
      --font-display: "SF Pro Display", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --font-body: "SF Pro Text", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --motion-fast: 180ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    html, body { font-family: var(--font-body); }
    h1, h2, h3, h4, .font-display, [data-display] { font-family: var(--font-display); }
    button, .chip, .selection-chip, .nav-item, .icon, .hero-tab {
      transition: transform var(--motion-fast), opacity var(--motion-fast), background-color var(--motion-fast), border-color var(--motion-fast), box-shadow var(--motion-fast);
    }
    button:active, .selection-chip:active, .hero-tab:active { transform: scale(0.98); }
    .text-primary { color: var(--brand-primary) !important; }
    .bg-primary { background-color: var(--brand-primary) !important; }
    .border-primary { border-color: var(--brand-primary) !important; }
  </style>
</head>

    function resolveLocalRoute(rawHref) {
      const normalizedHref = decodeURIComponent((rawHref || "").trim())
        .split("#")[0]
        .split("?")[0]
        .replace(/^\.\//, "")
        .replace(/^\/+/, "");
      const fileName = normalizedHref.split("/").pop() || normalizedHref;
      return localRoutes.get(normalizedHref) || localRoutes.get(fileName) || null;
    }

    function normalizeRoute(raw) {
      const route = (raw || "").replace(/^#/, "");
      return pages[route] ? route : "community";
    }

      document.title = routeTitles[route] || "拍立食 | 阶段4";

    function closeSheet() {
      sheetBackdrop.classList.remove("is-visible");
      sheetBackdrop.setAttribute("aria-hidden", "true");
      frame.style.pointerEvents = "auto";

    function openSheet(title, copy) {
      sheetTitle.textContent = title;
      sheetCopy.textContent = copy;
      sheetBackdrop.classList.add("is-visible");
      sheetBackdrop.setAttribute("aria-hidden", "false");
      frame.style.pointerEvents = "none";

    function isFrameDocumentReady(doc) {
      if (!doc || !doc.body) {
        return false;
      }
      const readyState = doc.readyState || "";
      const hasChildren = doc.body.children.length > 0;
      const hasVisibleText = (doc.body.innerText || "").trim().length > 0;
      return (readyState === "interactive" || readyState === "complete") && (hasChildren || hasVisibleText);
    }

        return false;
      }
      if (state.frameRetryRoute !== route) {
        state.frameRetryRoute = route;
        state.frameRetryCount = 0;
      }
      if (state.frameRetryCount >= 1) {
        return false;
      }
      state.frameRetryCount += 1;
      console.warn("stage4-frame-empty-retry", {
        route,
        reason,
        attempt: state.frameRetryCount
      });
      window.setTimeout(() => {
        if (state.pendingRoute && state.pendingRoute !== route) {
          return;
        }
        frame.srcdoc = pages[route];
      }, 90);
      return true;
    }

    function showRoute(nextRoute, options = {}) {
      const route = normalizeRoute(nextRoute);
      const pushHistory = options.pushHistory !== false;

      if (!pages[route]) {
        return;
      }

      if (route === state.currentRoute && frame.srcdoc) {
        history.replaceState(null, "", "#" + route);
        setTitle(route);
        return;
      }

      saveScrollPosition();

      if (pushHistory && state.currentRoute && state.currentRoute !== route && pages[state.currentRoute]) {
        state.previousRoute = state.currentRoute;
      }

      state.pendingRoute = route;
      state.frameRetryRoute = route;
      state.frameRetryCount = 0;
      frame.classList.add("is-switching");
      veil.classList.add("is-visible");
      veil.setAttribute("aria-hidden", "false");
      setTitle(route);
      history.replaceState(null, "", "#" + route);

      requestAnimationFrame(() => {
        frame.srcdoc = pages[route];
      });
    }

    function handleLocalRoute(targetRoute, event, options = {}) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
        if (typeof event.stopImmediatePropagation === "function") {
          event.stopImmediatePropagation();
        }
      }

      if (pages[targetRoute]) {
        showRoute(targetRoute, options);
        return;
      }

      showPlaceholder(targetRoute);
    }

        const anchor = event.target.closest("a[href]");
        if (!anchor) {
          return;
        }

        const rawHref = anchor.getAttribute("href") || "";
        const href = rawHref.trim();

        if (!href || href === "#") {
          return;
        }

        if (/^(https?:|mailto:|tel:)/i.test(href) || anchor.target === "_blank") {
          return;
        }

        const localRoute = resolveLocalRoute(href);
        if (localRoute) {
          handleLocalRoute(localRoute, event);
        }
      }, true);
    }

    function ensureArchiveWaterfall(doc) {
      if (doc.__stage4ArchiveWaterfall) {
        return doc.__stage4ArchiveWaterfall;
      }
      const grid = doc.querySelector(".masonry-grid");
      if (!grid) {
        return null;
      }

      const cards = Array.from(grid.querySelectorAll(".masonry-item"));
      grid.innerHTML = "";

      const left = doc.createElement("div");
      const right = doc.createElement("div");
      left.className = "archive-waterfall-lane";
      right.className = "archive-waterfall-lane";
      grid.append(left, right);

      let fallbackTurn = 0;
      const appendCard = (card) => {
        (fallbackTurn++ % 2 === 0 ? left : right).appendChild(card);
      };

      cards.forEach((card) => appendCard(card));

      const manager = {
        appendCards(items) {
          items.forEach((item) => appendCard(item));
        }
      };

      doc.__stage4ArchiveWaterfall = manager;
      return manager;

    function ensureArchiveInfiniteFeed(doc) {
      const grid = doc.querySelector(".masonry-grid");
      const waterfall = ensureArchiveWaterfall(doc);
      const shellScroller = doc.querySelector(".nexus-shell-screen");
      const fallbackScroller = doc.scrollingElement || doc.documentElement;
      const metricTargets = [shellScroller, fallbackScroller].filter((node, index, arr) => node && arr.indexOf(node) === index);
      const listenerTargets = [shellScroller, fallbackScroller, doc, doc.defaultView].filter((node, index, arr) => node && arr.indexOf(node) === index);
      const primaryScroller = metricTargets[0];
      if (!grid || !primaryScroller || grid.dataset.stage4FeedReady === "true") {
        return;
      }

      const templates = Array.from(grid.querySelectorAll(".masonry-item")).map((item) => item.cloneNode(true));
      if (!templates.length) {
        return;
      }

      grid.dataset.stage4FeedReady = "true";
      let seed = 0;
      let ticking = false;
      let exhausted = false;
      const MAX_ARCHIVE_CARDS = 10;

      const appendBatch = (count = 4) => {
        const currentCount = grid.querySelectorAll(".masonry-item").length;
        const remaining = MAX_ARCHIVE_CARDS - currentCount;
        if (remaining <= 0) {
          exhausted = true;
          return;
        }
        const nextCount = Math.min(count, remaining);
        const next = [];
        for (let i = 0; i < nextCount; i += 1) {
          const template = templates[(seed + i) % templates.length];
          const card = patchArchiveCard(template.cloneNode(true), seed + i);
          next.push(card);
        }
        if (waterfall) {
          waterfall.appendCards(next);
        } else {
          next.forEach((card) => grid.appendChild(card));
        }
        seed += nextCount;
        if (grid.querySelectorAll(".masonry-item").length >= MAX_ARCHIVE_CARDS) {
          exhausted = true;
        }
      };

      const maybeLoadMore = () => {
        if (exhausted) {
          return;
        }
        const scrolled = Math.max(...metricTargets.map((target) => target.scrollTop || 0));
        if (scrolled < 8) {
          return;
        }
        const remain = Math.min(...metricTargets.map((target) => target.scrollHeight - target.scrollTop - target.clientHeight));
        if (remain < 140) {
          appendBatch(4);
        }
      };

      const onScroll = () => {
        if (ticking) {
          return;
        }
        ticking = true;
        requestAnimationFrame(() => {
          ticking = false;
          maybeLoadMore();
        });
      };
      listenerTargets.forEach((target) => target.addEventListener("scroll", onScroll, { passive: true }));

    }

      try {
        doc = frame.contentDocument;
      } catch (error) {
        console.warn("stage4-frame-access-failed", error);
      }

      if (!isFrameDocumentReady(doc)) {
        const reason = doc ? (doc.readyState || "unknown-ready-state") : "no-document";
        if (retryLoadOnce(route, reason)) {
          return;
        }
        console.warn("stage4-frame-empty-giveup", { route, reason });
      }

      resetFrameSwapState(route);

      if (!isFrameDocumentReady(doc)) {
        return;
      }

      bindRouteView(doc, route);
      requestAnimationFrame(() => {
        restoreScrollPosition(route);
      });
    });

    sheetClose.addEventListener("click", closeSheet);
    sheetPrimary.addEventListener("click", closeSheet);
    sheetBackdrop.addEventListener("click", (event) => {
      if (event.target === sheetBackdrop) {
        closeSheet();
      }
    });

    const initialRoute = normalizeRoute(window.location.hash || "community");
    showRoute(initialRoute, { pushHistory: false });
  </script>
</body>
</html>
