    :root {

      --space-16: 16px;
      --space-20: 20px;
      --space-24: 24px;

      --radius-card: 28px;

    .stage2-veil.is-visible { opacity: 1; }
    .stage2-sheet-backdrop { position: fixed; inset: 0; display: flex; align-items: flex-end; justify-content: center; padding: var(--space-20); background: rgba(2, 3, 4, 0.24); backdrop-filter: blur(10px) saturate(1.08); -webkit-backdrop-filter: blur(10px) saturate(1.08); opacity: 0; pointer-events: none; transition: opacity 220ms ease; z-index: 60; }

    .stage2-sheet { position: relative; z-index: 1; width: min(100%, 414px); border-radius: var(--radius-card); padding: var(--space-20) var(--space-20) var(--space-16); background: linear-gradient(180deg, rgba(28, 31, 34, 0.86), rgba(12, 13, 15, 0.92)); border: 1px solid var(--glass-border); box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.14); transform: translateY(var(--space-24)) scale(0.98); transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1); }
    .stage2-sheet-backdrop.is-visible .stage2-sheet { transform: translateY(0) scale(1); }
    .stage2-sheet-handle { width: 44px; height: 5px; margin: 0 auto var(--space-12); border-radius: var(--radius-pill); background: rgba(255, 255, 255, 0.16); }
    .stage2-sheet-title { margin: 0; font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif; font-size: 22px; line-height: 1.15; letter-spacing: -0.03em; font-weight: 650; color: var(--text-primary); }
    .stage2-sheet-copy { margin: var(--space-12) 0 0; font-size: 13px; line-height: 1.7; color: var(--text-secondary); }
    .stage2-sheet-actions { display: flex; gap: var(--space-12); margin-top: var(--space-16); }
    .stage2-sheet-button { flex: 1; min-height: 56px; border: 0; border-radius: var(--radius-pill); font: inherit; font-size: 16px; line-height: 1; font-weight: 620; letter-spacing: -0.01em; cursor: pointer; transition: transform 160ms ease; }

    .stage2-sheet-button.secondary { background: rgba(255, 255, 255, 0.08); color: var(--text-primary); border: 1px solid rgba(255, 255, 255, 0.08); }
    .stage2-sheet-button.primary { background: linear-gradient(135deg, rgba(142, 182, 155, 0.94), rgba(35, 83, 71, 0.96)); color: #fff; box-shadow: 0 14px 32px rgba(35, 83, 71, 0.28); }

};
    const routeTitles = {
      nexus: "\u62cd\u7acb\u98df | \u4e2d\u67a2\u4e3b\u9875",
      camera: "\u62cd\u7acb\u98df | \u62cd\u6444",
      workbench: "\u62cd\u7acb\u98df | \u5206\u5b50\u91cd\u6784\u53f0",
      community: "\u62cd\u7acb\u98df | \u793e\u533a"
    };
    const localRoutes = new Map([
      ['Nexus.html', 'nexus'],
      ['\u62cd\u6444.html', 'camera'],
      ['\u5206\u5b50\u91cd\u6784\u53f0.html', 'workbench'],
      ['\u793e\u533a.html', 'community'],
      ['\u98ce\u5473\u6863\u6848\u9986.html', 'placeholder-archive'],
      ['\u7b56\u5c55\u4eba\u8bbe\u7f6e.html', 'placeholder-profile'],
      ['\u52a0\u8f7d\u8fc7\u6e21.html', 'loading-placeholder']
    ]);

    const utf8Decoder = new TextDecoder('utf-8');
    const pages = Object.fromEntries(Object.entries(pageB64).map(([route, value]) => {
      const binary = atob(value);
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      return [route, utf8Decoder.decode(bytes)];
    }));
    const routeFiles = {
      nexus: 'Nexus.html',
      camera: '拍摄.html',
      community: '社区.html'
    };
    const frame = document.getElementById('stage2Frame');
    const veil = document.getElementById('stage2Veil');
    const sheetBackdrop = document.getElementById('stage2SheetBackdrop');
    const sheetTitle = document.getElementById('stage2SheetTitle');
    const sheetCopy = document.getElementById('stage2SheetCopy');
    const sheetClose = document.getElementById('stage2SheetClose');
    const sheetPrimary = document.getElementById('stage2SheetPrimary');

    let currentRoute = 'nexus';
    let pendingRoute = null;

    function resolveLocalRoute(rawHref) {
      const normalizedHref = decodeURIComponent((rawHref || '').trim())
        .split('#')[0]
        .split('?')[0]
        .replace(/^\.\//, '')
        .replace(/^\/+/, '');
      const fileName = normalizedHref.split('/').pop() || normalizedHref;
      return localRoutes.get(normalizedHref) || localRoutes.get(fileName) || null;
    }

    function normalizeRoute(raw) {
      const route = (raw || '').replace(/^#/, '');
      return pages[route] ? route : 'nexus';
    }

    function setTitle(route) {
      document.title = routeTitles[route] || "拍立食 | 阶段2";
    }

    function closeSheet() {
      sheetBackdrop.classList.remove('is-visible');
      sheetBackdrop.setAttribute('aria-hidden', 'true');
      frame.style.pointerEvents = 'auto';
    }

    function openSheet(title, copy) {
      sheetTitle.textContent = title;
      sheetCopy.textContent = copy;
      sheetBackdrop.classList.add('is-visible');
      sheetBackdrop.setAttribute('aria-hidden', 'false');
      frame.style.pointerEvents = 'none';
    }

    function showPlaceholder(kind) {
      if (kind === 'loading-placeholder') {
        openSheet('\u521b\u4f5c\u7ed3\u679c\u6b63\u5728\u63a5\u5165', '\u9636\u6bb52-B \u4f1a\u628a\u52a0\u8f7d\u8fc7\u6e21\u3001\u827a\u672f\u7684\u8bde\u751f\u548c\u4fdd\u5b58\u6210\u529f\u7559\u5728\u7ed3\u679c\u9875\u8fd9\u4e00\u6bb5\u4e00\u8d77\u63a5\u8fdb\u6765\u3002');
        return;
      }
      if (kind === 'placeholder-community') {
        openSheet('\u793e\u533a\u6a21\u5757\u6682\u672a\u5e76\u5165', '\u793e\u533a\u4f1a\u5728\u9636\u6bb52 \u4e4b\u540e\u7684\u603b\u88c5\u7248\u518d\u63a5\u5165\uff0c\u73b0\u5728\u5148\u805a\u7126\u521b\u4f5c\u4e3b\u94fe\u8def\u3002');
        return;
      }
      if (kind === 'placeholder-archive') {
        openSheet('\u6863\u6848\u9986\u8fd8\u6ca1\u5e76\u5165', '\u98ce\u5473\u6863\u6848\u9986\u4f1a\u5728\u540e\u7eed\u9636\u6bb5\u5355\u72ec\u63a5\u5165\uff0c\u4e0d\u4f1a\u8986\u76d6\u4f60\u73b0\u6709\u7684\u72ec\u7acb\u9875\u9762\u3002');
        return;
      }
      if (kind === 'placeholder-profile') {
        openSheet('\u7b56\u5c55\u4eba\u8bbe\u7f6e\u6682\u672a\u5e76\u5165', '\u6211\u5148\u628a Nexus \u5230\u7ed3\u679c\u7684\u4e3b\u7ebf\u8def\u7531\u505a\u7a33\uff0c\u8bbe\u7f6e\u9875\u4f1a\u653e\u5728\u540e\u7eed\u5408\u5e76\u3002');
      }
    }

    function handleLocalRoute(targetRoute, event) {
      if (event) {
        event.preventDefault();
        event.stopPropagation();
        if (typeof event.stopImmediatePropagation === 'function') {
          event.stopImmediatePropagation();
        }
      }

      if (pages[targetRoute]) {
        showRoute(targetRoute);
      } else {
        showPlaceholder(targetRoute);
      }
    }

    function bindFrameInteractions(route) {
      const doc = frame.contentDocument;
      if (!doc) return;

      doc.addEventListener('click', (event) => {
        const anchor = event.target.closest('a[href]');
        if (anchor) {
            const targetRoute = resolveLocalRoute(anchor.getAttribute('href') || '');
            if (targetRoute) {
              handleLocalRoute(targetRoute, event);
              return;
          }
        }

        if (route === 'camera') {
          const closeButton = event.target.closest('.icon-button.ghost');
          if (closeButton) {
            handleLocalRoute('nexus', event);
            return;
          }
        }

        if (route === 'workbench') {
          const generateButton = event.target.closest('#startGenerateButton');
          if (generateButton) {
            handleLocalRoute('loading-placeholder', event);
          }
        }
      }, true);

      Array.from(doc.querySelectorAll('a[href]')).forEach((anchor) => {
        const targetRoute = resolveLocalRoute(anchor.getAttribute('href') || '');
        if (!targetRoute || anchor.dataset.stage2RouteBound === 'true') return;

        anchor.dataset.stage2RouteBound = 'true';
        anchor.addEventListener('click', (event) => {
          handleLocalRoute(targetRoute, event);
        }, true);
      });

      if (route === 'camera') {
        const closeButton = doc.querySelector('.icon-button.ghost');
        if (closeButton && closeButton.dataset.stage2RouteBound !== 'true') {
          closeButton.dataset.stage2RouteBound = 'true';
          closeButton.addEventListener('click', (event) => {
            handleLocalRoute('nexus', event);
          }, true);
        }
      }

      if (route === 'workbench') {
        const generateButton = doc.getElementById('startGenerateButton');
        if (generateButton && generateButton.dataset.stage2RouteBound !== 'true') {
          generateButton.dataset.stage2RouteBound = 'true';
          generateButton.addEventListener('click', (event) => {
            handleLocalRoute('loading-placeholder', event);
          }, true);
        }
      }
    }

    function finishRouteSwap(route) {
      currentRoute = route;
      pendingRoute = null;
      setTitle(route);
      const hash = route === 'nexus' ? '' : '#' + route;
      if (location.hash !== hash) {
        history.replaceState(null, '', hash || (location.pathname + location.search));
      }
      frame.classList.remove('is-switching');
      veil.classList.remove('is-visible');
      bindFrameInteractions(route);
    }

    function showRoute(route) {
      const normalized = normalizeRoute(route);
      const hash = normalized === 'nexus' ? '' : '#' + normalized;
      if (normalized === currentRoute && !pendingRoute) {
        if (location.hash !== hash) {
          history.replaceState(null, '', hash || (location.pathname + location.search));
        }
        frame.classList.remove('is-switching');
        veil.classList.remove('is-visible');
        bindFrameInteractions(normalized);
        return;
      }
      pendingRoute = normalized;
      frame.classList.add('is-switching');
      veil.classList.add('is-visible');
      const routeFile = routeFiles[normalized];
      if (routeFile) {
        if (frame.getAttribute('src') === routeFile && frame.contentDocument?.readyState !== 'loading') {
          finishRouteSwap(normalized);
          return;
        }
        frame.removeAttribute('srcdoc');
        frame.src = routeFile;
        window.setTimeout(() => {
          if (pendingRoute === normalized && frame.classList.contains('is-switching') && frame.contentDocument?.readyState !== 'loading') {
            finishRouteSwap(normalized);
          }
        }, 520);
        return;
      }
      frame.removeAttribute('src');
      frame.srcdoc = pages[normalized];
      window.setTimeout(() => {
        if (pendingRoute === normalized && frame.classList.contains('is-switching') && frame.contentDocument?.readyState !== 'loading') {
          finishRouteSwap(normalized);
        }
      }, 520);
    }

    frame.addEventListener('load', () => {
      finishRouteSwap(pendingRoute || currentRoute || 'nexus');
    });

    window.addEventListener('message', (event) => {
      const data = event.data || {};
      if (data.type !== 'stage2-route') return;
      if (pages[data.route]) {
        showRoute(data.route);
        return;
      }
      showPlaceholder(data.route || 'loading-placeholder');
    });

    window.addEventListener('hashchange', () => {
      showRoute(normalizeRoute(location.hash));
    });

    sheetClose.addEventListener('click', closeSheet);
    sheetPrimary.addEventListener('click', closeSheet);
    sheetBackdrop.addEventListener('click', (event) => {
      if (event.target === sheetBackdrop) closeSheet();
    });

    showRoute(normalizeRoute(location.hash));
  </script>
