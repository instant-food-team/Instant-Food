<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拍立食 | 阶段3</title>
  <link rel="stylesheet" href="wechat-unified.css" />
  <style>
    :root {
      color-scheme: dark;
      --brand-primary: #235347;
      --brand-accent: #8EB69B;
      --space-8: 8px;
      --space-12: 12px;
      --space-16: 16px;
      --space-20: 20px;
      --space-24: 24px;
      --space-32: 32px;
      --radius-device: 40px;
      --radius-card: 28px;
      --radius-pill: 999px;
      --stage3-bg:
        radial-gradient(circle at 15% 10%, rgba(35, 83, 71, 0.34) 0%, rgba(35, 83, 71, 0) 28%),
        radial-gradient(circle at 82% 14%, rgba(142, 182, 155, 0.14) 0%, rgba(142, 182, 155, 0) 22%),
        radial-gradient(circle at 50% 100%, rgba(35, 83, 71, 0.18) 0%, rgba(35, 83, 71, 0) 36%),
        linear-gradient(180deg, #050505 0%, #000000 100%);
      --glass-border: rgba(255, 255, 255, 0.12);
      --glass-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
      --text-primary: rgba(255, 255, 255, 0.96);
      --text-secondary: rgba(255, 255, 255, 0.7);
      --accent: #8eb69b;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: #000; }
    body {
      min-height: 100dvh;
      background: var(--stage3-bg);
      color: var(--text-primary);
      font-family: "SF Pro Text", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      overflow: hidden;
    }

    .stage3-root {
      position: relative;
      width: 100%;
      min-height: 100dvh;
      isolation: isolate;
    }

    .stage3-frame {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100dvh;
      border: 0;
      display: block;
      background: transparent;
      opacity: 1;
      transition: opacity 220ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .stage3-frame.is-switching {
      opacity: 0.08;
    }

    .stage3-veil {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 220ms cubic-bezier(0.22, 1, 0.36, 1);
      background: radial-gradient(circle at 50% 40%, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0) 28%), rgba(6, 7, 9, 0.18);
      backdrop-filter: blur(8px) saturate(1.08);
      -webkit-backdrop-filter: blur(8px) saturate(1.08);
      z-index: 20;
    }

    .stage3-veil.is-visible {
      opacity: 1;
    }

    .stage3-sheet-backdrop {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: var(--space-20);
      background: rgba(2, 3, 4, 0.24);
      backdrop-filter: blur(10px) saturate(1.08);
      -webkit-backdrop-filter: blur(10px) saturate(1.08);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
      z-index: 60;
    }

    .stage3-sheet-backdrop.is-visible {
      opacity: 1;
      pointer-events: auto;
    }

    .stage3-sheet {
      position: relative;
      z-index: 1;
      width: min(100%, 414px);
      border-radius: var(--radius-card);
      padding: var(--space-20) var(--space-20) var(--space-16);
      background: linear-gradient(180deg, rgba(28, 31, 34, 0.86), rgba(12, 13, 15, 0.92));
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.14);
      transform: translateY(var(--space-24)) scale(0.98);
      transition: transform 220ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    .stage3-sheet-backdrop.is-visible .stage3-sheet {
      transform: translateY(0) scale(1);
    }

    .stage3-sheet-handle {
      width: 44px;
      height: 5px;
      margin: 0 auto var(--space-12);
      border-radius: var(--radius-pill);
      background: rgba(255, 255, 255, 0.16);
    }

    .stage3-sheet-title {
      margin: 0;
      font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 22px;
      line-height: 1.15;
      letter-spacing: -0.03em;
      font-weight: 650;
      color: var(--text-primary);
    }

    .stage3-sheet-copy {
      margin: var(--space-12) 0 0;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .stage3-sheet-actions {
      display: flex;
      gap: var(--space-12);
      margin-top: var(--space-16);
    }

    .stage3-sheet-button {
      flex: 1;
      min-height: 56px;
      border: 0;
      border-radius: var(--radius-pill);
      font: inherit;
      font-size: 16px;
      line-height: 1;
      font-weight: 620;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: transform 160ms ease;
    }

    .stage3-sheet-button:active {
      transform: scale(0.985);
    }

    .stage3-sheet-button.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .stage3-sheet-button.primary {
      background: linear-gradient(135deg, rgba(142, 182, 155, 0.94), rgba(35, 83, 71, 0.96));
      color: #fff;
      box-shadow: 0 14px 32px rgba(35, 83, 71, 0.28);
    }

    .stage3-toast {
      position: fixed;
      left: 50%;
      bottom: var(--space-32);
      z-index: 70;
      min-width: 236px;
      max-width: min(88vw, 360px);
      padding: var(--space-12) var(--space-16);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(28, 31, 34, 0.88), rgba(12, 13, 15, 0.94));
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: var(--glass-shadow), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px) saturate(1.08);
      -webkit-backdrop-filter: blur(16px) saturate(1.08);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.45;
      text-align: center;
      letter-spacing: -0.01em;
      transform: translate(-50%, var(--space-24));
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .stage3-toast.is-visible {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .stage3-toast strong {
      display: block;
      margin-bottom: 4px;
      color: #fff;
      font-family: "SF Pro Display", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      line-height: 1.2;
      font-weight: 620;
    }
  </style>
  <style data-phase5-baseline>
    :root {
      color-scheme: dark;
      --brand-primary: #235347;
      --brand-accent: #8EB69B;
      --space-8: 8px;
      --space-12: 12px;
      --space-16: 16px;
      --space-20: 20px;
      --space-24: 24px;
      --space-32: 32px;
      --radius-device: 40px;
      --radius-card: 28px;
      --radius-pill: 999px;
      --font-display: "SF Pro Display", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --font-body: "SF Pro Text", "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      --motion-fast: 180ms cubic-bezier(0.22, 1, 0.36, 1);
    }

    html, body { font-family: var(--font-body); }
    h1, h2, h3, h4, .font-display, [data-display], .recipe-step-title { font-family: var(--font-display); }
    button, .chip, .selection-chip, .nav-item, .icon, .hero-tab, .recipe-step-chip {
      transition: transform var(--motion-fast), opacity var(--motion-fast), background-color var(--motion-fast), border-color var(--motion-fast), box-shadow var(--motion-fast);
    }
    button:active, .selection-chip:active, .hero-tab:active { transform: scale(0.98); }
    .text-primary { color: var(--brand-primary) !important; }
    .bg-primary { background-color: var(--brand-primary) !important; }
    .border-primary { border-color: var(--brand-primary) !important; }
  </style>
</head>

    function resolveLocalRoute(rawHref) {
      const normalizedHref = decodeURIComponent((rawHref || "").trim())
        .split("#")[0]
        .split("?")[0]
        .replace(/^\.\//, "")
        .replace(/^\/+/, "");
      const fileName = normalizedHref.split("/").pop() || normalizedHref;
      return localRoutes.get(normalizedHref) || localRoutes.get(fileName) || null;
    }

    function normalizeRoute(raw) {
      const route = (raw || "").replace(/^#/, "");
      return pages[route] ? route : "workbench";
    }

    function setTitle(route) {
      document.title = routeTitles[route] || "拍立食 | 阶段3";
    }

    function closeSheet() {
      sheetBackdrop.classList.remove("is-visible");
      sheetBackdrop.setAttribute("aria-hidden", "true");
      frame.style.pointerEvents = "auto";
    }

    function openSheet(title, copy) {
      sheetTitle.textContent = title;
      sheetCopy.textContent = copy;
      sheetBackdrop.classList.add("is-visible");
      sheetBackdrop.setAttribute("aria-hidden", "false");
      frame.style.pointerEvents = "none";
    }

    function showToast(title, copy) {
      if (state.toastTimer) {
        clearTimeout(state.toastTimer);
        state.toastTimer = null;
      }
      toast.innerHTML = "<strong>" + title + "</strong>" + copy;
      toast.classList.add("is-visible");
      state.toastTimer = setTimeout(() => {
        toast.classList.remove("is-visible");
        state.toastTimer = null;
      }, 2200);
    }

        );

        }
      }

      if (targetRoute === "result" && state.currentRoute === "loading" && state.loadingStatus !== "complete") {
        showToast("还在生成中", "再等片刻，算法完成后会自动进入结果页。");
        return;
      }

      if (pages[targetRoute]) {
        showRoute(targetRoute);
        return;
      }

      showPlaceholder(targetRoute);
    }

    function parseQuantityText(text) {
      const trimmed = (text || "").trim().replace(/\s+/g, " ");
      const match = trimmed.match(/^(\d+(?:\.\d+)?)\s*(.*)$/);
      if (!match) {
        return { count: 1, unit: trimmed || "份" };
      }

      return {
        count: Number(match[1]),
        unit: (match[2] || "份").trim()
      };
    }

    function isChipSelected(button, view) {
      const backgroundColor = view.getComputedStyle(button).backgroundColor || "";
      return /35,\s*83,\s*71/.test(backgroundColor);
    }

    function isIngredientIncluded(rejectButton, view) {
      const backgroundColor = view.getComputedStyle(rejectButton).backgroundColor || "";
      return !/153,\s*0,\s*0/.test(backgroundColor);
    }

    function persistWorkbenchSelection(doc) {
      const view = doc.defaultView;
      const ingredientCards = Array.from(doc.querySelectorAll(".ingredient-card"));
      const chipSections = Array.from(doc.querySelectorAll("main .space-y-6 > section"));

      const ingredients = ingredientCards.map((card) => {
        const name = card.querySelector(".ingredient-name")?.textContent?.trim() || "";
        const quantityText = card.querySelector(".quantity-value")?.textContent?.trim() || "1 份";
        const buttons = card.querySelectorAll("button");
        const rejectButton = buttons[3];
        const quantity = parseQuantityText(quantityText);

        return {
          name,
          count: quantity.count,
          unit: quantity.unit,
          included: rejectButton ? isIngredientIncluded(rejectButton, view) : true
        };
      });

      const hasIngredient = ingredients.some((item) => item.included);
      if (!hasIngredient) {
        view.alert("请至少保留一个食材，再进入确认菜单。");
        return false;
      }

      const selectedFromGroup = (index, multi) => {
        const buttons = Array.from(chipSections[index]?.querySelectorAll(".selection-chip") || []);
        const selected = buttons.filter((button) => isChipSelected(button, view)).map((button) => button.textContent.trim());
        return multi ? selected : (selected[0] || "");
      };

      const selection = {
        ingredients,
        technique: selectedFromGroup(0, false),
        tools: selectedFromGroup(1, true),
        tastes: selectedFromGroup(2, true)
      };

      view.sessionStorage.setItem(storageKeys.selection, JSON.stringify(selection));
      return true;
    }

    function setLoadingProgress(doc, value) {
      const progressCircle = doc.getElementById("loaderProgressCircle");
      const progressLabel = doc.getElementById("progressLabel");
      const loaderRing = doc.querySelector(".loader-ring");
      const radius = 52;
      const circumference = 2 * Math.PI * radius;
      const clamped = Math.max(0, Math.min(100, value));

      if (progressCircle) {
        progressCircle.style.strokeDasharray = circumference;
        progressCircle.style.strokeDashoffset = circumference * (1 - clamped / 100);
      }

      if (loaderRing) {
        loaderRing.style.setProperty("--loader-fill", clamped + "%");
      }

      if (progressLabel) {
        progressLabel.textContent = String(Math.round(clamped));
      }
    }

    function markLoadingComplete(doc) {
      const shell = doc.getElementById("loadingShell");
      if (!shell) return;

      shell.classList.add("is-loading");
      shell.classList.add("is-complete");

      const loadingChip = doc.querySelector(".loading-chip");
      const loaderCenterIcon = doc.getElementById("loaderCenterIcon");
      const loaderFireworks = doc.getElementById("loaderFireworks");
      const progressTitle = doc.getElementById("progressTitle");
      const progressMessage = doc.getElementById("progressMessage");
      const progressEta = doc.getElementById("progressEta");
      const loadingHeadline = doc.getElementById("loadingHeadline");
      const loadingSubline = doc.getElementById("loadingSubline");
      const bottomNote = doc.getElementById("bottomNote");

      setLoadingProgress(doc, 100);

      if (loadingChip) loadingChip.textContent = "已完成";
      if (loaderCenterIcon) loaderCenterIcon.textContent = "check";
      if (loaderFireworks) loaderFireworks.hidden = false;
      if (progressTitle) progressTitle.textContent = "已完成";
      if (progressMessage) progressMessage.textContent = "";
      if (progressEta) progressEta.textContent = "";
      if (loadingHeadline) loadingHeadline.textContent = "菜品已完成";
      if (loadingSubline) loadingSubline.textContent = "现在可以查看结果";
      if (bottomNote) bottomNote.textContent = "生成完成，可查看结果。";
    }

      function observeLoadingState(doc) {
        const shell = doc.getElementById("loadingShell");
        if (!shell || shell.dataset.stage3ObserverBound === "true") return;

      shell.dataset.stage3ObserverBound = "true";

        const update = () => {
          if (shell.classList.contains("is-complete")) {
            state.loadingStatus = "complete";
            if (state.loadingAdvanceEnabled && state.currentRoute === "loading" && !state.pendingRoute) {
              state.loadingAdvanceEnabled = false;
              window.setTimeout(() => {
                if (state.currentRoute === "loading" && state.loadingStatus === "complete" && !state.pendingRoute) {
                  showRoute("result");
                }
              }, 220);
            }
            return;
          }
          if (shell.classList.contains("is-loading")) {
            state.loadingStatus = "running";
          }
      };

      update();

      const observer = new MutationObserver(update);
      observer.observe(shell, { attributes: true, attributeFilter: ["class"] });
    }

    function updateResultPrimaryButton(doc) {
      const saveButton = doc.querySelector(".absolute.bottom-0 button");
      if (!saveButton) return;

      const label = saveButton.querySelector("span");
      const icon = saveButton.querySelector(".material-symbols-outlined");

      if (label) {
        label.textContent = state.resultSaved ? "已保存到档案馆" : "保存到档案馆";
      }

      if (icon) {
        icon.textContent = state.resultSaved ? "check" : "bookmark";
      }

      saveButton.style.background = state.resultSaved
        ? "linear-gradient(180deg, rgba(100, 185, 156, 0.98), rgba(35, 83, 71, 0.98))"
        : "";
      saveButton.style.boxShadow = state.resultSaved
        ? "0 18px 36px rgba(35, 83, 71, 0.32)"
        : "";
    }

    function persistResultDraft(doc) {
      const view = doc.defaultView;
      const title = doc.querySelector("#resultCopyBlock h2")?.textContent?.trim() || "生成结果";
      const summary = doc.querySelector("#resultCopyBlock p")?.textContent?.trim() || "";
      const selectionRaw = view.sessionStorage.getItem(storageKeys.selection);
      const selection = selectionRaw ? JSON.parse(selectionRaw) : null;

      view.sessionStorage.setItem(storageKeys.savedDraft, JSON.stringify({
        title,
        summary,
        selection,
        savedAt: new Date().toISOString()
      }));
    }

    function bindResultView(doc) {
      const headerButtons = doc.querySelectorAll("header button");
      const backButton = headerButtons[0];
      const moreButton = headerButtons[1];
      const saveButton = doc.querySelector(".absolute.bottom-0 button");

      updateResultPrimaryButton(doc);

      if (backButton && backButton.dataset.stage3RouteBound !== "true") {
        backButton.dataset.stage3RouteBound = "true";
        backButton.addEventListener("click", (event) => {
          handleLocalRoute("loading", event);
        }, true);
      }

      if (moreButton && moreButton.dataset.stage3RouteBound !== "true") {
        moreButton.dataset.stage3RouteBound = "true";
        moreButton.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          openSheet(
            "更多结果动作会在后续阶段补齐",
            "阶段3 先把生成、查看和保存这条主链路做稳。分享、重做、编辑说明和社区分发，会在阶段4与总装页统一接入。"
          );
        }, true);
      }

      if (saveButton && saveButton.dataset.stage3RouteBound !== "true") {
        saveButton.dataset.stage3RouteBound = "true";
        saveButton.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          if (typeof event.stopImmediatePropagation === "function") {
            event.stopImmediatePropagation();
          }
          state.resultSaved = true;
          persistResultDraft(doc);
          updateResultPrimaryButton(doc);
          showToast("保存成功", "这道作品已写入阶段3草稿，并保持停留在当前结果页。");
        }, true);
      }
    }

      function bindLoadingView(doc) {
        observeLoadingState(doc);

        if (state.loadingStatus === "complete") {
          markLoadingComplete(doc);
          if (state.loadingAdvanceEnabled) {
            state.loadingAdvanceEnabled = false;
            window.setTimeout(() => {
              if (state.currentRoute === "loading" && state.loadingStatus === "complete" && !state.pendingRoute) {
                showRoute("result");
              }
            }, 220);
          }
        }

        const confirmButton = doc.getElementById("bottomConfirm");
        if (confirmButton && confirmButton.dataset.stage3RouteBound !== "true") {
          confirmButton.dataset.stage3RouteBound = "true";
          confirmButton.addEventListener("click", () => {
            state.loadingAdvanceEnabled = true;
            state.loadingStatus = "running";
            state.resultSaved = false;
          }, true);
        }

      const moreButton = doc.querySelector(".topbar button[aria-label='更多']");
      if (moreButton && moreButton.dataset.stage3RouteBound !== "true") {
        moreButton.dataset.stage3RouteBound = "true";
        moreButton.addEventListener("click", (event) => {
          event.preventDefault();
          event.stopPropagation();
          openSheet(
            "更多操作稍后接入",
            "阶段3 先保持加载链路干净稳定。更多操作不会删改你现有页面，只会在总装页里统一整理。"
          );
        }, true);
      }
    }

      function bindWorkbenchView(doc) {
        const generateButton = doc.getElementById("startGenerateButton");
        if (!generateButton || generateButton.dataset.stage3RouteBound === "true") return;

      generateButton.dataset.stage3RouteBound = "true";
      generateButton.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        if (typeof event.stopImmediatePropagation === "function") {
          event.stopImmediatePropagation();
        }

          const persisted = persistWorkbenchSelection(doc);
          if (!persisted) return;

          state.loadingAdvanceEnabled = true;
          state.loadingStatus = "idle";
          state.resultSaved = false;
          showRoute("loading");
        }, true);
      }

    function bindFrameInteractions(route) {
      const doc = frame.contentDocument;
      if (!doc) return;

      doc.addEventListener("click", (event) => {
        const anchor = event.target.closest("a[href]");
        if (!anchor) return;

        const targetRoute = resolveLocalRoute(anchor.getAttribute("href") || "");
        if (targetRoute) {
          handleLocalRoute(targetRoute, event);
        }
      }, true);

      Array.from(doc.querySelectorAll("a[href]")).forEach((anchor) => {
        const targetRoute = resolveLocalRoute(anchor.getAttribute("href") || "");
        if (!targetRoute || anchor.dataset.stage3RouteBound === "true") return;

        anchor.dataset.stage3RouteBound = "true";
        anchor.addEventListener("click", (event) => {
          handleLocalRoute(targetRoute, event);
        }, true);
      });

      if (route === "workbench") {
        bindWorkbenchView(doc);
      }

      if (route === "loading") {
        bindLoadingView(doc);
      }

      if (route === "result") {
        bindResultView(doc);
      }
    }

    function finishRouteSwap(route) {
      state.currentRoute = route;
      state.pendingRoute = null;
      setTitle(route);

      const hash = route === "workbench" ? "" : "#" + route;
      if (location.hash !== hash) {
        history.replaceState(null, "", hash || (location.pathname + location.search));
      }

      frame.classList.remove("is-switching");
      veil.classList.remove("is-visible");
      bindFrameInteractions(route);
    }

    function showRoute(route) {
      const normalized = normalizeRoute(route);
      state.pendingRoute = normalized;
      frame.classList.add("is-switching");
      veil.classList.add("is-visible");
      const routeFile = routeFiles[normalized];
      if (routeFile) {
        frame.removeAttribute("srcdoc");
        frame.src = routeFile;
        return;
      }
      frame.removeAttribute("src");
      frame.srcdoc = pages[normalized];
    }

    frame.addEventListener("load", () => {
      finishRouteSwap(state.pendingRoute || state.currentRoute || "workbench");
    });

    window.addEventListener("hashchange", () => {
      showRoute(normalizeRoute(location.hash));
    });

    sheetClose.addEventListener("click", closeSheet);
    sheetPrimary.addEventListener("click", closeSheet);
    sheetBackdrop.addEventListener("click", (event) => {
      if (event.target === sheetBackdrop) {
        closeSheet();
      }
    });

    showRoute(normalizeRoute(location.hash));
  </script>
</body>
</html>
