<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拍立食</title>
  <meta http-equiv="refresh" content="0; url=./app-dist/" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f1e8;
      --ink: #1d241f;
      --muted: #5d645f;
      --accent: #235347;
      --card: rgba(255, 252, 245, 0.9);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(35, 83, 71, 0.18), transparent 32%),
        radial-gradient(circle at bottom right, rgba(204, 139, 74, 0.18), transparent 28%),
        linear-gradient(180deg, #f8f4eb 0%, #f0eadf 100%);
      color: var(--ink);
    }

    main {
      width: min(560px, 100%);
      padding: 32px 28px;
      border-radius: 28px;
      background: var(--card);
      box-shadow: 0 18px 50px rgba(31, 40, 34, 0.12);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    a {
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>拍立食</h1>
    <p>正在进入新的代码化前端入口。如果没有自动跳转，请使用下面的入口链接。</p>
    <a href="./app-dist/">打开新前端</a>
  </main>
</body>
</html>
